name: TEMP Apply GB Highlights Pastoral

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: temp-apply-gb-highlights-pastoral
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.number == 22 && github.event.pull_request.head.ref == 'reconcile/gb-highlights-pastoral-2026-07-22'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: reconcile/gb-highlights-pastoral-2026-07-22
          fetch-depth: 0

      - name: Apply exact SSOT patch
        run: python3 scripts/_temp_reconcile_gb_highlights_pastoral.py

      - name: Publish scoped permanent files
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git add \
            projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md \
            projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md \
            projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-22_5650c96_highlights-pastoral.md
          test "$(git diff --cached --name-only | wc -l)" -eq 3
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'reconcile(gb): record highlights and pastoral closures [audit-witness]'
          git push origin HEAD:reconcile/gb-highlights-pastoral-2026-07-22
