name: Temp apply matrix normalization

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: temp-apply-matrix-normalization-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  normalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply conservative normalization
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import collections, json, re

          matrix_path=Path('projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md')
          archive_path=Path('projects/gb-is-my-strength/archive/fixed/2026-07-23-current-truth-cleanup/MATRIX_ROWS_REMOVED_FROM_OPEN.md')
          original=matrix_path.read_text(encoding='utf-8')
          lines=original.splitlines()
          section=None
          open_section=False
          removed=[]
          kept=[]
          section_rows=collections.Counter()
          header_rx=re.compile(r'^(##\s+.*(?:ОТКРЫТО|P0/P1).*?)\s*\((\d+)\)\s*$')
          strip_count=lambda value: re.sub(r'\s*\(\d+\)\s*$','',value).strip()

          for line_no,line in enumerate(lines,1):
              if line.startswith('## '):
                  section=strip_count(line[3:].strip())
                  open_section=('ОТКРЫТО' in section or section.startswith('🔴 P0/P1'))
              is_row=line.startswith('| ') and line.count('|')>=3 and not line.startswith('|---')
              if is_row:
                  cells=[cell.strip() for cell in line.strip('|').split('|')]
                  is_header=bool(cells and cells[0] in {'ID','Поле','Категория','Статус'})
                  if open_section and not is_header:
                      ident=cells[0] if cells else '<missing>'
                      status_cell=cells[1] if len(cells)>1 else ''
                      if status_cell.startswith('✅'):
                          removed.append({'line':line_no,'section':section,'id':ident,'row':line})
                          continue
                      section_rows[section]+=1
              kept.append(line)

          normalized=[]
          for line in kept:
              m=header_rx.match(line)
              if m:
                  title=m.group(1)
                  section_name=strip_count(title[3:].strip())
                  line=f'{title} ({section_rows.get(section_name,0)})'
              normalized.append(line)
          candidate='\n'.join(normalized)+'\n'

          expected=[
            'DEP-BLOCK-EDITORIAL-REGISTRY','DEP-BLOCK-MAPS-VALIDATE','DEP-BLOCK-CSS-IMPORTANT-CEILING',
            'DEP-BLOCK-AVRAAM-AUDIT','S-DATA-01','AUDIT-CSS-SITECSS-STRUCT-CORRUPTION',
            'REG-VALIDATE-GENEALOGY-TEMPLATE','REG-EDITORIAL-METADATA-MISSING','S-DATA-01',
            'AUDIT-CSS-NO-STRUCTURAL-PARSE','AUDIT-CSS-FLOATCLUSTER-COMMENT-CORRUPTION',
          ]
          ids=[item['id'] for item in removed]
          if removed and ids != expected:
              raise SystemExit(f'Unexpected removed rows: {ids}')
          if 'AR-IDX-CSS-01' not in candidate:
              raise SystemExit('Active AR-IDX-CSS-01 must remain in canonical matrix')

          changed=(candidate != original)
          if changed:
              if len(removed)!=11: raise SystemExit(f'Expected 11 explicit fixed rows, got {len(removed)}')
              matrix_path.write_text(candidate,encoding='utf-8')
              archive_path.parent.mkdir(parents=True,exist_ok=True)
              archive=['# Fixed rows demoted from open sections — 2026-07-23','',
                       'These rows were removed from the canonical open lists because their own status cell began with an explicit `✅` marker.','',
                       'The full historical wording is preserved below. No evidence was deleted.']
              for item in removed:
                  archive += ['',f"## {item['id']}",f"- Original line: {item['line']}",f"- Original section: {item['section']}",'',item['row']]
              archive_path.write_text('\n'.join(archive)+'\n',encoding='utf-8')
          Path('/tmp/matrix-normalization.changed').write_text('1' if changed else '0')
          print(json.dumps({'changed':changed,'removed':ids,'counts':dict(section_rows)},ensure_ascii=False,indent=2))
          PY

      - name: Validate canonical files
        shell: bash
        run: |
          python3 scripts/check_auditrepo_structure.py
          python3 scripts/validate_audit_repo.py
          git diff --check

      - name: Commit normalized matrix
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          if test "$(cat /tmp/matrix-normalization.changed)" = 0; then
            echo 'Matrix normalization already applied; no commit needed.'
            exit 0
          fi
          git diff --name-only | sort > /tmp/changed.txt
          cat > /tmp/allowed.txt <<'EOF'
          projects/gb-is-my-strength/archive/fixed/2026-07-23-current-truth-cleanup/MATRIX_ROWS_REMOVED_FROM_OPEN.md
          projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          EOF
          sort -o /tmp/allowed.txt /tmp/allowed.txt
          git add -A
          git diff --cached --name-only | sort > /tmp/staged.txt
          diff -u /tmp/allowed.txt /tmp/staged.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'cleanup(matrix): demote fixed rows from open sections'
          git push origin HEAD:"$BRANCH"
