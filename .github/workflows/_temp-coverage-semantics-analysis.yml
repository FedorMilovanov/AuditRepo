name: Temp coverage semantics analysis

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Checkout current source main
        uses: actions/checkout@v4
        with:
          repository: FedorMilovanov/gb-is-my-strength
          ref: main
          path: source-current
          fetch-depth: 1

      - name: Compare broad and explicit evidence-ID parsing
        shell: bash
        run: |
          mkdir -p reports/coverage-semantics
          python3 - <<'PY'
          from pathlib import Path
          import collections, json, re

          project=Path('projects/gb-is-my-strength')
          source=Path('source-current')
          matrix_path=project/'verified/MASTER_BUG_MATRIX.md'
          matrix=matrix_path.read_text(encoding='utf-8')
          id_pattern=r'(?:P[0-3]|BUG|NEW|AUDIT|SEC|UI|PC|R|AR|SEARCH|DATA|GATE|CONTENT|CACHE|DEPLOY|SEO|VALIDATE|IMAGE|SHADOW|NOINDEX|STRANGLER|DEAD|MAP|AVRAAM|HUB|KARTY|ASTRO|ENGINE|A11Y|RIVER|QUAL|DRAW|BASE|TEXT|ARCH|SVG|FONT|MINI|WAYP|CSS|SIG|REG|PERF|RELIEF|ROUTE|GLYPH|GRAT|SEA|ORN|HALO|MEDIA|CART|ROSE|LOD)[A-Z0-9]*(?:-[A-Za-z0-9]+)+'
          ID_RE=re.compile(r'\b('+id_pattern+r')\b')
          BACKTICK_RE=re.compile(r'`('+id_pattern+r')`')
          HEADING_RE=re.compile(r'^#{1,6}\s+(?:\*\*|`)?('+id_pattern+r')(?:`|\*\*)?(?:\s|$)')
          LABEL_RE=re.compile(r'^\s*(?:[-*]\s+)?(?:\*\*|`)?('+id_pattern+r')(?:`|\*\*)?\s*[:—–-]')

          all_matrix_ids=set(ID_RE.findall(matrix))
          open_ids=set()
          matrix_rows={}
          section=''
          for line_no,line in enumerate(matrix.splitlines(),1):
              if line.startswith('## '): section=line
              if section and ('ОТКРЫТО' in section or 'РЕФАКТОРИНГ' in section or 'AUDITREPO' in section):
                  cells=[cell.strip() for cell in line.strip('|').split('|')] if line.startswith('| ') else []
                  if cells and re.fullmatch(id_pattern,cells[0]):
                      open_ids.add(cells[0]); matrix_rows[cells[0]]={'line':line_no,'section':section,'row':line}

          evidence_files=[]
          for sub in ('reverify','incoming','working'):
              directory=project/sub
              if directory.exists(): evidence_files.extend(directory.rglob('*.md'))

          broad=collections.defaultdict(list)
          explicit=collections.defaultdict(list)
          for path in evidence_files:
              text=path.read_text(encoding='utf-8',errors='ignore')
              for line_no,line in enumerate(text.splitlines(),1):
                  for ident in ID_RE.findall(line):
                      broad[ident].append({'file':str(path.relative_to(project)),'line':line_no,'text':line[:500]})
                  structured=set(BACKTICK_RE.findall(line))
                  heading=HEADING_RE.match(line)
                  label=LABEL_RE.match(line)
                  if heading: structured.add(heading.group(1))
                  if label: structured.add(label.group(1))
                  if line.startswith('| ') and line.count('|')>=2:
                      first=line.strip('|').split('|',1)[0].strip()
                      if re.fullmatch(id_pattern,first): structured.add(first)
                  for ident in structured:
                      explicit[ident].append({'file':str(path.relative_to(project)),'line':line_no,'text':line[:500]})

          broad_unregistered=sorted(set(broad)-all_matrix_ids)
          explicit_unregistered=sorted(set(explicit)-all_matrix_ids)
          broad_only=sorted(set(broad_unregistered)-set(explicit_unregistered))

          # Orphan rows: inspect existing source-path witnesses named directly in the matrix row.
          path_token=re.compile(r'`([^`]+\.(?:js|mjs|cjs|ts|tsx|jsx|astro|css|json|yml|yaml|md|html))(?:[:#][^`]*)?`')
          orphan=[]
          for ident in sorted(open_ids-set(explicit)):
              info=matrix_rows.get(ident,{})
              row=info.get('row','')
              tokens=path_token.findall(row)
              checked=[]
              for token in tokens:
                  normalized=token.lstrip('./')
                  candidate=source/normalized
                  checked.append({'token':token,'normalized':normalized,'exists':candidate.exists(),'isFile':candidate.is_file()})
              orphan.append({
                  'id':ident,
                  'matrixLine':info.get('line'),
                  'section':info.get('section'),
                  'row':row,
                  'sourcePathCandidates':checked,
                  'hasExistingSourcePath':any(item['isFile'] for item in checked),
              })

          report={
              'sourceSha':(source/'.git/HEAD').read_text(errors='ignore').strip(),
              'matrixIds':len(all_matrix_ids),
              'openIds':len(open_ids),
              'broadEvidenceIds':len(broad),
              'explicitEvidenceIds':len(explicit),
              'broadUnregisteredCount':len(broad_unregistered),
              'explicitUnregisteredCount':len(explicit_unregistered),
              'broadOnlyFalsePositiveCandidates':broad_only,
              'explicitUnregistered':{ident:explicit[ident] for ident in explicit_unregistered},
              'orphanOpenCountUsingExplicitParser':len(orphan),
              'orphanWithExistingSourcePath':sum(1 for item in orphan if item['hasExistingSourcePath']),
              'orphans':orphan,
          }
          Path('reports/coverage-semantics/report.json').write_text(json.dumps(report,ensure_ascii=False,indent=2),encoding='utf-8')
          md=['# Matrix coverage semantics analysis','',
              f"- Broad unregistered: **{len(broad_unregistered)}**",
              f"- Explicit structured unregistered: **{len(explicit_unregistered)}**",
              f"- Broad-only false-positive candidates: **{len(broad_only)}**",
              f"- Open orphans with explicit parser: **{len(orphan)}**",
              f"- Orphans naming an existing current-source file: **{sum(1 for item in orphan if item['hasExistingSourcePath'])}**",'',
              'No canonical file was changed.']
          Path('reports/coverage-semantics/summary.md').write_text('\n'.join(md)+'\n',encoding='utf-8')
          print('\n'.join(md))
          PY

      - name: Upload analysis
        uses: actions/upload-artifact@v4
        with:
          name: coverage-semantics-analysis-${{ github.run_id }}
          path: reports/coverage-semantics/**
          if-no-files-found: error
          retention-days: 7
