name: TEMP Finalize GB Source Registry SSOT

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ github.event.pull_request.number == 25 && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Apply exact SSOT finalizer
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/_temp_finalize_gb_source_registry.py')
          text = path.read_text(encoding='utf-8')
          old = 'matrix = matrix.rstrip() + session + "\\n"'
          new = 'matrix = matrix.rstrip() + session.rstrip() + "\\n"'
          if text.count(old) != 1:
              raise SystemExit(f'expected one EOF-normalization target, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python3 scripts/_temp_finalize_gb_source_registry.py

      - name: Remove temporary branch infrastructure
        run: |
          rm -f scripts/_temp_finalize_gb_source_registry.py
          rm -f .audit-temp-source-registry-witness-trigger
          rm -f .audit-temp-source-registry-finalize-trigger

      - name: Validate expected permanent diff
        shell: bash
        run: |
          set +e
          diagnostics=finalizer-diagnostics.txt
          : > "$diagnostics"
          failed=0
          check_exists() {
            if [ -f "$1" ]; then echo "PASS exists $1" >> "$diagnostics"; else echo "FAIL missing $1" >> "$diagnostics"; failed=1; fi
          }
          check_absent() {
            if [ ! -e "$1" ]; then echo "PASS absent $1" >> "$diagnostics"; else echo "FAIL still-present $1" >> "$diagnostics"; failed=1; fi
          }
          check_exists projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          check_exists projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          check_exists projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-22_6c4106ae_source-registry-production.md
          check_absent scripts/_temp_finalize_gb_source_registry.py
          check_absent .audit-temp-source-registry-witness-trigger
          check_absent .audit-temp-source-registry-finalize-trigger
          echo "--- git status --short" >> "$diagnostics"
          git status --short >> "$diagnostics"
          echo "--- git diff --check" >> "$diagnostics"
          git diff --check >> "$diagnostics" 2>&1
          diff_rc=$?
          if [ "$diff_rc" -ne 0 ]; then failed=1; fi
          cat "$diagnostics"
          exit "$failed"

      - name: Upload finalizer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-registry-finalizer-diagnostics-${{ github.run_id }}
          path: finalizer-diagnostics.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Commit SSOT and cleanup
        run: |
          rm -f finalizer-diagnostics.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "reconcile(gb): record source registry production closure"
          git push origin HEAD:reconcile/gb-source-registry-2026-07-22
