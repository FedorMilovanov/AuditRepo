name: TEMP gb SSOT 1a66bd8

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'reconcile/gb-head-1a66bd8-2026-07-21'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply exact SSOT patch
        run: python scripts/_temp_patch_gb_ssot_1a66bd8.py

      - name: Verify target HEAD and fixed rows
        run: |
          grep -q '1a66bd8ef6c0316842deef75371db9598f7a16c6' projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          grep -q '^| MAP-P0-04 | ✅ \*\*FIXED 2026-07-21' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          grep -q '^| MAP-P0-05 | ✅ \*\*FIXED 2026-07-21' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md

      - name: Commit patched SSOT files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          git commit -m "reconcile(gb): advance SSOT to source head 1a66bd8"
          git push origin HEAD:reconcile/gb-head-1a66bd8-2026-07-21
