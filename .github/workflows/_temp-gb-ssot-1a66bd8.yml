name: TEMP gb SSOT 1a66bd8

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'reconcile/gb-head-1a66bd8-2026-07-21'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Correct SSOT provenance
        run: python scripts/_temp_correct_gb_ssot_1a66bd8.py

      - name: Verify corrections
        run: |
          grep -q 'PR #97 закрыл `MAP-P0-04/05`' projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          grep -q 'CURRENT_HEAD_REVERIFY_2026-07-21_1f80f12.md' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md

      - name: Commit corrected SSOT files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          git commit -m "reconcile(gb): correct 1a66bd8 SSOT provenance"
          git push origin HEAD:reconcile/gb-head-1a66bd8-2026-07-21
