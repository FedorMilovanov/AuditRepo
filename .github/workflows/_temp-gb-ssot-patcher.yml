name: TEMP gb SSOT patcher

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'reconcile/gb-head-1f80f12-2026-07-21'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply exact SSOT patch
        run: python scripts/_temp_patch_gb_ssot_1f80f12.py

      - name: Verify intended documents changed
        run: |
          git diff --check
          git diff --exit-code -- . ':(exclude)projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md' ':(exclude)projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md'
          grep -q '1f80f12d8bea9a9eb2c196ed030ddfc5be3924df' projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          grep -q 'CURRENT_HEAD_REVERIFY_2026-07-21_1f80f12.md' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          ! grep -q '^| MAP-P0-02 |' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md

      - name: Commit patched SSOT files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          git commit -m "reconcile(gb): advance SSOT to source head 1f80f12"
          git push origin HEAD:reconcile/gb-head-1f80f12-2026-07-21
