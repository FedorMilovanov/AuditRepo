name: TEMP gb SSOT patcher

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'reconcile/gb-head-1f80f12-2026-07-21'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Move closed P0 rows to FIXED
        run: python scripts/_temp_fix_gb_matrix_p0_move.py

      - name: Verify placement
        run: |
          grep -q '^| MAP-P0-02 | ✅ \*\*FIXED 2026-07-21' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          grep -q '^| ASTRO-P0-02 | ✅ \*\*FIXED 2026-07-21' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md

      - name: Commit corrected matrix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          git commit -m "reconcile(gb): move landed map P0 rows to fixed"
          git push origin HEAD:reconcile/gb-head-1f80f12-2026-07-21
