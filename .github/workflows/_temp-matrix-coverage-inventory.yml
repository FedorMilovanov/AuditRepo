name: Temp matrix coverage inventory

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run matrix coverage diagnostics
        shell: bash
        run: |
          mkdir -p reports/matrix-coverage
          set +e
          python3 scripts/check_matrix_coverage.py \
            > reports/matrix-coverage/raw.log 2>&1
          status=$?
          echo "$status" > reports/matrix-coverage/exit-code
          python3 - <<'PY'
          from pathlib import Path
          import collections, json, re
          text=Path('reports/matrix-coverage/raw.log').read_text(encoding='utf-8',errors='replace')
          lines=text.splitlines()
          categories=collections.Counter()
          ids=collections.defaultdict(list)
          for line in lines:
              category='other'
              low=line.lower()
              if 'bad-commit-ref' in low or 'commit ref' in low: category='bad-commit-ref'
              elif 'missing' in low and 'matrix' in low: category='evidence-missing-from-matrix'
              elif 'duplicate' in low: category='duplicate-id'
              elif 'orphan' in low: category='orphan-evidence'
              elif line.lstrip().startswith(('❌','⚠','ERROR','WARNING')): category='diagnostic'
              categories[category]+=1
              match=re.search(r'\b([A-Z][A-Z0-9]*(?:-[A-Z0-9]+){1,})\b',line)
              if match: ids[match.group(1)].append(line)
          report={
              'exitCode':int(Path('reports/matrix-coverage/exit-code').read_text()),
              'lineCount':len(lines),
              'categories':dict(categories),
              'ids':{key:value[:20] for key,value in sorted(ids.items())},
          }
          Path('reports/matrix-coverage/report.json').write_text(json.dumps(report,ensure_ascii=False,indent=2),encoding='utf-8')
          print(json.dumps(report,ensure_ascii=False,indent=2))
          PY
          exit 0

      - name: Upload matrix coverage inventory
        uses: actions/upload-artifact@v4
        with:
          name: matrix-coverage-inventory-${{ github.run_id }}
          path: reports/matrix-coverage/**
          if-no-files-found: error
          retention-days: 7
