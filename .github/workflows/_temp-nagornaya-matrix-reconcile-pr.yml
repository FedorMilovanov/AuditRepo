name: TEMP PR Nagornaya Matrix Reconcile

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'agent/nagornaya-deep-audit-2026-07-22'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply exact canonical matrix patch
        run: python3 projects/gb-is-my-strength/scripts/_temp_patch_nagornaya_matrix_2026_07_22.py

      - name: Remove transaction script and validate diff
        run: |
          git rm projects/gb-is-my-strength/scripts/_temp_patch_nagornaya_matrix_2026_07_22.py
          git diff --check
          grep -F 'Source HEAD | `2b67ee8f6ee788cb0457b5171e1d99d7afeff5dd`' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          grep -F 'NG-RUNTIME-BAR-ASSET-01' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          grep -F 'NG-PASTORAL-SAFETY-01' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          grep -F 'RUNTIME-HIGHLIGHT-DEDUPE-01 | 🟠' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md

      - name: Commit verified reconciliation
        run: |
          git add projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'reconcile(gb): register verified Nagornaya audit lanes'
          git push origin HEAD:agent/nagornaya-deep-audit-2026-07-22
