name: TEMP Observe GB Exact Pages And Live

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  observe:
    if: ${{ github.event.pull_request.number == 23 }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout observer request
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Wait for exact source CI, Pages and live origin
        shell: bash
        run: |
          set -o pipefail
          python3 - <<'PY' | tee gb-live-witness.txt
          import hashlib
          import json
          import pathlib
          import time
          import urllib.request

          trigger = pathlib.Path('.audit-temp-pages-observer-trigger').read_text(encoding='utf-8')
          values = {}
          for raw in trigger.splitlines():
              if '=' in raw:
                  key, value = raw.split('=', 1)
                  values[key.strip()] = value.strip()
          sha = values.get('target', '')
          if len(sha) != 40:
              raise SystemExit(f'INVALID_TARGET_SHA={sha!r}')

          required_names = [
              'Shared Files Guard',
              'Visual Parity Guard — pixel-diff',
              'Native Source Contract',
              'Route Registry Validators',
              'Metadata & IndexNow Readiness',
              'Deploy to GitHub Pages',
          ]

          def source_runs():
              api_url = f'https://api.github.com/repos/FedorMilovanov/gb-is-my-strength/actions/runs?head_sha={sha}&per_page=100'
              api_req = urllib.request.Request(api_url, headers={
                  'Accept': 'application/vnd.github+json',
                  'User-Agent': 'auditrepo-exact-sha-observer',
                  'X-GitHub-Api-Version': '2022-11-28',
              })
              with urllib.request.urlopen(api_req, timeout=30) as response:
                  return json.load(response).get('workflow_runs', [])

          def latest(runs, name):
              matching = [run for run in runs if run.get('name') == name]
              return sorted(matching, key=lambda item: item.get('created_at', ''))[-1] if matching else None

          deadline = time.time() + 1200
          selected = {}
          while time.time() < deadline:
              runs = source_runs()
              selected = {name: latest(runs, name) for name in required_names}
              states = []
              all_green = True
              for name in required_names:
                  run = selected[name]
                  if not run:
                      states.append(f'{name}=not-found')
                      all_green = False
                      continue
                  state = f"{run.get('status')}:{run.get('conclusion')}"
                  states.append(f'{name}={state}')
                  if run.get('status') == 'completed' and run.get('conclusion') != 'success':
                      raise SystemExit(f'EXACT_SHA_WORKFLOW_FAILED={name}:{run.get("id")}:{state}')
                  if run.get('status') != 'completed' or run.get('conclusion') != 'success':
                      all_green = False
              print('POLL ' + ' | '.join(states), flush=True)
              if all_green:
                  break
              time.sleep(20)
          else:
              raise SystemExit('EXACT_SHA_WORKFLOWS_TIMEOUT')

          print(f'TARGET_SHA={sha}')
          for name in required_names:
              run = selected[name]
              print(f"WORKFLOW={name}|{run.get('id')}|completed|success")

          witness_url = f'https://gospod-bog.ru/nagornaya/istochniki/?witness={sha}-{int(time.time())}'
          live_req = urllib.request.Request(witness_url, headers={
              'User-Agent': 'auditrepo-live-origin-witness',
              'Cache-Control': 'no-cache, no-store, max-age=0',
              'Pragma': 'no-cache',
              'Accept': 'text/html,application/xhtml+xml',
          })
          with urllib.request.urlopen(live_req, timeout=45) as response:
              body = response.read()
              status = response.status
              headers = dict(response.headers.items())
          text = body.decode('utf-8', errors='replace')
          required = [
              'Ключевые библиографические данные и доступные первичные объекты проверены на дату обновления',
              'TMSJ 12/1 (Spring 2001), pp. 49–68',
              'tmsj7d.pdf',
              'TMSJ 7/1 (Spring 1996), pp. 75–105',
              'tmsj7h.pdf',
              'TMSJ 7/2 (Fall 1996), pp. 213–239',
              'не автоматически официальную позицию TMS',
          ]
          forbidden = [
              'Все ссылки верифицированы по первоисточникам',
              'TMSJ 12/1 (Spring 2001), pp. 49–74',
          ]
          missing = [item for item in required if item not in text]
          present_forbidden = [item for item in forbidden if item in text]
          print(f'LIVE_URL={witness_url}')
          print(f'LIVE_STATUS={status}')
          print(f'LIVE_BYTES={len(body)}')
          print(f'LIVE_SHA256={hashlib.sha256(body).hexdigest()}')
          print(f"LIVE_ETAG={headers.get('ETag', '')}")
          print(f"LIVE_LAST_MODIFIED={headers.get('Last-Modified', '')}")
          print(f'LIVE_REQUIRED_PASS={len(required) - len(missing)}/{len(required)}')
          print(f'LIVE_FORBIDDEN_PASS={len(forbidden) - len(present_forbidden)}/{len(forbidden)}')
          if missing:
              print('LIVE_MISSING=' + json.dumps(missing, ensure_ascii=False))
          if present_forbidden:
              print('LIVE_FORBIDDEN_PRESENT=' + json.dumps(present_forbidden, ensure_ascii=False))
          if status != 200 or missing or present_forbidden:
              raise SystemExit('LIVE_ORIGIN_WITNESS_FAILED')
          print('LIVE_ORIGIN_WITNESS=PASS')
          PY

      - name: Upload exact witness
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gb-live-witness-${{ github.run_id }}
          path: gb-live-witness.txt
          if-no-files-found: error
          retention-days: 14
