name: TEMP Observe GB Source Registry Production

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  observe:
    if: ${{ github.event.pull_request.number == 25 }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout witness request
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Wait for exact source CI, Pages, registry and live origin
        run: |
          python3 - <<'PY'
          import base64
          import hashlib
          import json
          import pathlib
          import time
          import urllib.error
          import urllib.request

          trigger = pathlib.Path('.audit-temp-source-registry-witness-trigger').read_text(encoding='utf-8')
          values = {}
          for raw in trigger.splitlines():
              if '=' in raw:
                  key, value = raw.split('=', 1)
                  values[key.strip()] = value.strip()

          target = values.get('target', '')
          premerge = values.get('premerge', '')
          route_run_id = values.get('route_run', '')
          for label, value in [('target', target), ('premerge', premerge)]:
              if len(value) != 40:
                  raise SystemExit(f'INVALID_{label.upper()}={value!r}')
          if not route_run_id.isdigit():
              raise SystemExit(f'INVALID_ROUTE_RUN={route_run_id!r}')

          def request_json(url):
              request = urllib.request.Request(url, headers={
                  'Accept': 'application/vnd.github+json',
                  'User-Agent': 'auditrepo-source-registry-witness',
                  'X-GitHub-Api-Version': '2022-11-28',
              })
              with urllib.request.urlopen(request, timeout=45) as response:
                  return json.load(response)

          route_run = request_json(f'https://api.github.com/repos/FedorMilovanov/gb-is-my-strength/actions/runs/{route_run_id}')
          if route_run.get('head_sha') != premerge:
              raise SystemExit(f'PREMERGE_ROUTE_SHA_MISMATCH={route_run.get("head_sha")}')
          if route_run.get('name') != 'Route Registry Validators':
              raise SystemExit(f'PREMERGE_ROUTE_NAME_MISMATCH={route_run.get("name")}')
          if route_run.get('status') != 'completed' or route_run.get('conclusion') != 'success':
              raise SystemExit('PREMERGE_ROUTE_RUN_NOT_SUCCESS')

          required_names = [
              'Shared Files Guard',
              'Visual Parity Guard — pixel-diff',
              'Native Source Contract',
              'Metadata & IndexNow Readiness',
              'Deploy to GitHub Pages',
          ]
          selected = None
          deadline = time.time() + 30 * 60
          while time.time() < deadline:
              payload = request_json(
                  f'https://api.github.com/repos/FedorMilovanov/gb-is-my-strength/actions/runs?head_sha={target}&per_page=100'
              )
              runs = payload.get('workflow_runs', [])
              by_name = {}
              for run in runs:
                  by_name.setdefault(run.get('name'), []).append(run)
              current = {}
              for name in required_names:
                  candidates = sorted(by_name.get(name, []), key=lambda item: item.get('created_at', ''))
                  if candidates:
                      current[name] = candidates[-1]
              summary = {
                  name: f"{run.get('id')}:{run.get('status')}:{run.get('conclusion')}"
                  for name, run in current.items()
              }
              print('POLL=' + json.dumps(summary, ensure_ascii=False, sort_keys=True), flush=True)

              failed = [
                  (name, run)
                  for name, run in current.items()
                  if run.get('status') == 'completed' and run.get('conclusion') != 'success'
              ]
              if failed:
                  raise SystemExit('SOURCE_WORKFLOW_FAILED=' + json.dumps([
                      {'name': name, 'id': run.get('id'), 'conclusion': run.get('conclusion')}
                      for name, run in failed
                  ], ensure_ascii=False))

              if all(name in current for name in required_names) and all(
                  current[name].get('status') == 'completed' and current[name].get('conclusion') == 'success'
                  for name in required_names
              ):
                  selected = current
                  break
              time.sleep(20)

          if selected is None:
              raise SystemExit('SOURCE_WORKFLOWS_TIMEOUT')

          registry_payload = request_json(
              f'https://api.github.com/repos/FedorMilovanov/gb-is-my-strength/contents/data/nagornaya/source-registry.json?ref={target}'
          )
          registry_bytes = base64.b64decode(registry_payload['content'])
          registry = json.loads(registry_bytes.decode('utf-8'))
          sources = {source['id']: source for source in registry.get('sources', [])}
          claims = {claim['id']: claim for claim in registry.get('claims', [])}

          expected_sources = {
              'tmsj-green-ipsissima-vox': ('tmsj12d.pdf', '49–68', 'Donald E. Green'),
              'tmsj-thomas-jesus-seminar': ('tmsj7d.pdf', '75–105', 'Robert L. Thomas'),
              'tmsj-nichols-davidic-kingdom': ('tmsj7h.pdf', '213–239', 'Stephen J. Nichols'),
          }
          for source_id, (exact_object, pages, author) in expected_sources.items():
              source = sources.get(source_id)
              if not source:
                  raise SystemExit(f'REGISTRY_SOURCE_MISSING={source_id}')
              if source.get('exactObject') != exact_object or source.get('pages') != pages or source.get('author') != author:
                  raise SystemExit(f'REGISTRY_SOURCE_MISMATCH={source_id}:{source}')
              if source.get('attributionLevel') != 'author' or source.get('status') != 'verified':
                  raise SystemExit(f'REGISTRY_SOURCE_BOUNDARY_MISMATCH={source_id}')

          green_claim = claims.get('green-ipsissima-vox-model', {})
          if green_claim.get('layer') != 'literary-model' or not green_claim.get('alternative'):
              raise SystemExit('GREEN_MODEL_LAYER_OR_ALTERNATIVE_MISSING')
          for claim_id in [
              'tms-institutional-ipsissima-vox-position',
              'tms-institutional-jesus-seminar-position',
              'tms-institutional-davidic-kingdom-position',
          ]:
              claim = claims.get(claim_id, {})
              if claim.get('confidence') != 'unsupported' or claim.get('primaryEvidence') != [] or claim.get('attributionLevel') != 'institution':
                  raise SystemExit(f'INSTITUTION_BOUNDARY_MISMATCH={claim_id}:{claim}')

          live_url = f'https://gospod-bog.ru/nagornaya/istochniki/?witness={target}-{int(time.time())}'
          live_request = urllib.request.Request(live_url, headers={
              'User-Agent': 'auditrepo-source-registry-live-witness',
              'Cache-Control': 'no-cache, no-store, max-age=0',
              'Pragma': 'no-cache',
              'Accept': 'text/html,application/xhtml+xml',
          })
          with urllib.request.urlopen(live_request, timeout=60) as response:
              body = response.read()
              status = response.status
              headers = dict(response.headers.items())
          text = body.decode('utf-8', errors='replace')
          required_live = [
              'Ключевые библиографические данные и доступные первичные объекты проверены на дату обновления',
              'TMSJ 12/1 (Spring 2001), pp. 49–68',
              'tmsj12d.pdf',
              'TMSJ 7/1 (Spring 1996), pp. 75–105',
              'tmsj7d.pdf',
              'TMSJ 7/2 (Fall 1996), pp. 213–239',
              'tmsj7h.pdf',
              'не автоматически официальную позицию TMS',
          ]
          forbidden_live = [
              'Все ссылки верифицированы по первоисточникам',
              'TMSJ 12/1 (Spring 2001), pp. 49–74',
          ]
          missing = [item for item in required_live if item not in text]
          forbidden_present = [item for item in forbidden_live if item in text]
          if status != 200 or missing or forbidden_present:
              raise SystemExit('LIVE_WITNESS_FAILED=' + json.dumps({
                  'status': status,
                  'missing': missing,
                  'forbiddenPresent': forbidden_present,
              }, ensure_ascii=False))

          witness = {
              'targetSha': target,
              'premergeSha': premerge,
              'premergeRouteRun': int(route_run_id),
              'sourceRuns': {
                  name: {
                      'id': selected[name].get('id'),
                      'event': selected[name].get('event'),
                      'headSha': selected[name].get('head_sha'),
                      'conclusion': selected[name].get('conclusion'),
                  }
                  for name in required_names
              },
              'registry': {
                  'sha256': hashlib.sha256(registry_bytes).hexdigest(),
                  'sourceCount': len(registry.get('sources', [])),
                  'claimCount': len(registry.get('claims', [])),
                  'sourceIds': sorted(sources),
                  'institutionBoundaryClaims': 3,
              },
              'live': {
                  'url': live_url,
                  'status': status,
                  'bytes': len(body),
                  'sha256': hashlib.sha256(body).hexdigest(),
                  'etag': headers.get('ETag', ''),
                  'lastModified': headers.get('Last-Modified', ''),
                  'requiredPass': f'{len(required_live)}/{len(required_live)}',
                  'forbiddenAbsencePass': f'{len(forbidden_live)}/{len(forbidden_live)}',
              },
          }
          pathlib.Path('gb-source-registry-production-witness.json').write_text(
              json.dumps(witness, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(witness, ensure_ascii=False, indent=2))
          print('GB_SOURCE_REGISTRY_PRODUCTION_WITNESS=PASS')
          PY

      - name: Upload exact witness
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gb-source-registry-witness-${{ github.run_id }}
          path: gb-source-registry-production-witness.json
          if-no-files-found: warn
          retention-days: 14
