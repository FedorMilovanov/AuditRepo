name: TEMP PR Reader R3 reconciliation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'reconcile/reader-r3-75b236ac-2026-07-21'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Extract and run deterministic reconciliation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          lines = Path('.github/workflows/_temp-run-reader-r3-reconcile.yml').read_text(encoding='utf-8').splitlines()
          step = next(i for i, line in enumerate(lines) if 'Reconcile Reader R3 source truth' in line)
          start = next(i for i in range(step, len(lines)) if "python3 - <<'PY'" in lines[i])
          end = next(i for i in range(start + 1, len(lines)) if lines[i].strip() == 'PY')
          code = []
          for line in lines[start + 1:end]:
              code.append(line[10:] if line.startswith('          ') else line)
          Path('/tmp/reconcile-reader-r3.py').write_text('\n'.join(code) + '\n', encoding='utf-8')
          PY
          python3 /tmp/reconcile-reader-r3.py
      - name: Validate reconciled truth
        shell: bash
        run: |
          grep -q '75b236acd31a779b431406710309f6a086b7f845' projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          grep -q 'Reader R4' projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          grep -q 'READER-R3-SERIES-FACADE-01' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          grep -q 'ЗАКРЫТО (113)' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          test -f projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-21_75b236ac.md
      - name: Commit reconciled SSOT and remove temporary workflows
        shell: bash
        run: |
          git rm .github/workflows/_temp-run-reader-r3-reconcile.yml \
                 .github/workflows/_temp-pr-reader-r3-reconcile.yml
          git add projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md \
                  projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md \
                  projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-21_75b236ac.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'reconcile(gb): record Reader R3 at 75b236ac'
          git push origin HEAD:main
