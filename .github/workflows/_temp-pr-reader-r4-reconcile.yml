name: TEMP PR Reader R4 reconciliation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'reconcile/reader-r4-3a715551-2026-07-21'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Extract immutable reconciliation program
        shell: bash
        run: |
          git show 3ddbf28d9c1943ba6a21c16eef503e5d257bf012:.github/workflows/_temp-pr-reader-r4-reconcile.yml > /tmp/original-r4.yml
          python3 - <<'PY'
          from pathlib import Path
          lines = Path('/tmp/original-r4.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(lines) if "python3 - <<'PY'" in line)
          end = next(i for i in range(start + 1, len(lines)) if lines[i].strip() == 'PY')
          code = [line[10:] if line.startswith('          ') else line for line in lines[start + 1:end]]
          Path('/tmp/reconcile-reader-r4.py').write_text('\n'.join(code) + '\n', encoding='utf-8')
          PY
          python3 /tmp/reconcile-reader-r4.py
      - name: Validate reconciled truth
        shell: bash
        run: |
          grep -q '3a715551409a01bff0d81e2921a12a45e6973ef3' projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          grep -q 'Reader R5' projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          grep -q 'READER-R4-PUBLIC-SURFACE-REGISTRY-01' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          grep -q 'ЗАКРЫТО (114)' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          test -f projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-21_3a715551.md
      - name: Commit reconciled SSOT and remove workflow
        shell: bash
        run: |
          git rm .github/workflows/_temp-pr-reader-r4-reconcile.yml
          git add projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md \
                  projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md \
                  projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-21_3a715551.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'reconcile(gb): record Reader R4 at 3a715551'
          git push origin HEAD:main
