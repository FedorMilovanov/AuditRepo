name: TEMP PR Reader R5 reconciliation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'reconcile/reader-r5-43d8672f-2026-07-21'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reconcile Reader R5 immutable truth
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          SOURCE = '43d8672f59128de816cfd47c638c132a73d71599'
          SHORT = '43d8672f'
          prompt_path = Path('projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md')
          matrix_path = Path('projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md')
          reverify_path = Path('projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-21_43d8672f.md')

          def once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          prompt = prompt_path.read_text(encoding='utf-8')
          prompt = once(
              prompt,
              '> **Актуально на 2026-07-21. Source `main`: `3a715551409a01bff0d81e2921a12a45e6973ef3`.**\n> PR #98 (карты), #101 (Reader R1), #102 (Reader R3 façade) и #103 (Reader R4 registry) влиты.',
              '> **Актуально на 2026-07-21. Source `main`: `43d8672f59128de816cfd47c638c132a73d71599`.**\n> PR #98 (карты), #101 (Reader R1), #102 (Reader R3 façade), #103 (Reader R4 registry) и #104 (Reader R5 overlay runtime) влиты.',
              'prompt source header',
          )
          prompt = once(
              prompt,
              '> Current reverify: `reverify/CURRENT_HEAD_REVERIFY_2026-07-21_3a715551.md`.',
              '> Current reverify: `reverify/CURRENT_HEAD_REVERIFY_2026-07-21_43d8672f.md`.',
              'prompt reverify pointer',
          )
          prompt = once(prompt, '# expect 3a715551… or newer', '# expect 43d8672f… or newer', 'prompt expected head')

          r5_section = '''\n### Reader R5 — PR #104 (`43d8672f`)\n\n- один защищённый `window.OverlayRuntime` / `SiteUtils.OverlayRuntime` store;\n- named/reference-counted scroll owners и ordered top-layer stack;\n- exact restoration исходных body/html styles, classes, attributes и `scrollY`;\n- exact opener focus return, общий focus trap и Escape только для top layer;\n- nested `inert` / `aria-hidden` claims, idempotent reopen и pagehide/beforeunload recovery;\n- `site.js` больше не содержит вторую private scroll-lock implementation;\n- ReaderSettings, Hermenevtika mobile TOC и Gill/series TOC, learning, settings, GBS2 sheets мигрированы;\n- постоянные VM/static contracts и browser matrix Chromium/Firefox/WebKit зелёные;\n- временные runners, patchers и raw inventory удалены до merge.\n'''
          prompt = once(
              prompt,
              '- временные runners/scripts/triggers удалены до merge.\n\n## Следующий обязательный SYSTEM lane — Reader R5',
              '- временные runners/scripts/triggers удалены до merge.\n' + r5_section + '\n## Следующий обязательный SYSTEM lane — Special Overlay Adapters',
              'insert R5 landed section',
          )

          old_lane = '''## Следующий обязательный SYSTEM lane — Special Overlay Adapters\n\nСоздать единый **overlay lifecycle / focus / scroll-lock API** для reader-поверхностей,\nне меняя визуальный контракт.\n\nЦели R5:\n\n1. Инвентаризировать все overlay/sheet/dialog реализации и прямые записи\n   `body.style.overflow`, `documentElement.style.overflow`, локальные lock counters и focus traps.\n2. Ввести один lifecycle coordinator поверх уже существующего `SiteUtils` scroll-lock:\n   register/open/close/destroy, owner token, nested overlays, restore focus, Escape policy.\n3. Перевести standalone article settings и другие reader overlays с прямого overflow на coordinator.\n4. Сохранить DOM/CSS/selectors и публичные кнопки; R5 — runtime infrastructure, не redesign.\n5. Гарантировать, что один overlay не снимает lock другого и destroy снимает только свой token.\n6. Добавить dependency-free mutation/runtime tests и Chromium witnesses минимум для:\n   series settings, standalone article settings, nested/competing overlay и ordinary page navigation.\n7. Проверить `aria-hidden`, `inert`, initial focus, focus return, Escape и reduced-motion.\n8. Перед merge: Shared Files Guard, Route Registry, Native Source, production-like build,\n   functional engine sweep и targeted browser matrix.\n\n**Не смешивать R5** с единым progress/bookmarks/notes storage, визуальным redesign,\nкартографией, контентом или удалением compatibility preference keys.\n'''
          new_lane = '''## Следующий обязательный SYSTEM lane — Special Overlay Adapters\n\nЗакрыть оставшуюся часть issue #58 для `special`-поверхностей, не меняя географию,\nвизуальный стиль или бизнес-логику карт/3D.\n\nЦели lane:\n\n1. Повторно инвентаризировать только production direct writers вне canonical runtime:\n   `karty/_engine/map-engine.js`, 3D/MindMap consumers и built-app adapters.\n2. Подключить их к `OverlayRuntime` через узкие special adapters с отдельными owner IDs.\n3. Удалить direct body/html overflow/position/top writers и локальные competing Escape handlers.\n4. Сохранить существующие DOM/CSS/selectors, map camera, gestures и modal visuals.\n5. Добавить browser witnesses: photo/gallery nested over place panel, map sheet + global reader overlay,\n   Escape top-only, exact focus/scroll restore, pagehide/destroy и mobile landscape.\n6. Расширить static guard так, чтобы direct lock writers оставались только в canonical module/bridge.\n7. После полного special-surface parity закрыть issue #58; только затем переходить к R6.\n\n**Не смешивать** с MAP-P0/P1 rendering fixes, layer/theme work, reader state R6,\nконтентом, визуальным redesign или compatibility-key cleanup.\n'''
          prompt = once(prompt, old_lane, new_lane, 'replace next lane')
          prompt = once(prompt, '## После R5', '## После special adapters', 'after-lane heading')
          prompt = once(
              prompt,
              'Reader R5 с картографическими runtime-fix не смешивать.',
              'Special overlay adapter lane не должен исправлять map rendering/data defects.',
              'map boundary',
          )
          prompt_path.write_text(prompt, encoding='utf-8')

          matrix = matrix_path.read_text(encoding='utf-8')
          matrix = once(
              matrix,
              '| Source HEAD | `3a715551409a01bff0d81e2921a12a45e6973ef3` (main; PR #98 maps, PR #101 Reader R1, PR #102 Reader R3 and PR #103 Reader R4 landed) |',
              '| Source HEAD | `43d8672f59128de816cfd47c638c132a73d71599` (main; PR #98 maps, PR #101 Reader R1, PR #102 Reader R3, PR #103 Reader R4 and PR #104 Reader R5 landed) |',
              'matrix source head',
          )
          matrix = once(
              matrix,
              '| Deploy | 🟠 **SOURCE/RELEASE GATES GREEN THROUGH `3a715551` / EXACT DEPLOYED SHA PROOF PENDING.** PR #103 final head passed Shared Files Guard, Route Registry Validators, Native Source Contract, Astro, production-like dist, native output, workflow policy and clean-tree checks. |',
              '| Deploy | 🟠 **SOURCE/RELEASE GATES GREEN THROUGH `43d8672f` / EXACT DEPLOYED SHA PROOF PENDING.** PR #104 passed Shared Files Guard, Route Registry Validators, Native Source Contract, Astro, production-like dist, native output, workflow policy, clean-tree and Chromium/Firefox/WebKit overlay matrix. |',
              'matrix deploy',
          )
          matrix = once(
              matrix,
              '| Last reverify | `reverify/CURRENT_HEAD_REVERIFY_2026-07-21_3a715551.md` |',
              '| Last reverify | `reverify/CURRENT_HEAD_REVERIFY_2026-07-21_43d8672f.md` |',
              'matrix reverify',
          )
          matrix = once(
              matrix,
              'Текущий source/release authority — `reverify/CURRENT_HEAD_REVERIFY_2026-07-21_3a715551.md`;',
              'Текущий source/release authority — `reverify/CURRENT_HEAD_REVERIFY_2026-07-21_43d8672f.md`;',
              'matrix authority pointer',
          )
          matrix = once(matrix, '## ✅ ЗАКРЫТО (114)', '## ✅ ЗАКРЫТО (115)', 'closed count')
          matrix = once(
              matrix,
              '| READER-R4-PUBLIC-SURFACE-REGISTRY-01 |',
              '| READER-R5-OVERLAY-RUNTIME-01 | ✅ **FIXED 2026-07-21.** Один canonical OverlayRuntime владеет reader overlay stack, named scroll tokens, exact style/scroll/focus restoration, inert/aria policy, top-layer Escape и pagehide recovery. `site.js` delegate-only; ReaderSettings, Hermenevtika и shared Gill/series sheets мигрированы. Permanent VM/static tests и Chromium/Firefox/WebKit matrix green. Special map/3D adapters остаются отдельным открытым остатком issue #58. | `43d8672f` PR#104 |\n| READER-R4-PUBLIC-SURFACE-REGISTRY-01 |',
              'insert R5 matrix row',
          )
          session = '''\n\n### 2026-07-21 — Reader R5 unified overlay runtime (`43d8672f`)\n\n- Source `main` advanced to `43d8672f59128de816cfd47c638c132a73d71599` via PR #104.\n- One protected OverlayRuntime now owns reader overlay stack, named scroll tokens, focus, inert/aria and lifecycle recovery.\n- The competing private `site.js` lock implementation was replaced by canonical delegates.\n- ReaderSettings, Hermenevtika mobile TOC and shared Gill/series sheets were migrated without visual redesign.\n- Permanent evidence: Shared Files Guard, Route Registry, Native Source, production-like build, clean-tree and Chromium/Firefox/WebKit matrix.\n- Exact deployed SHA remains pending; issue #58 remains open only for special map/3D adapters.\n'''
          if '### 2026-07-21 — Reader R5 unified overlay runtime (`43d8672f`)' in matrix:
              raise SystemExit('R5 session entry already exists')
          matrix = matrix.rstrip() + session
          matrix_path.write_text(matrix, encoding='utf-8')

          reverify = '''# CURRENT HEAD REVERIFY — 2026-07-21 — `43d8672f`\n\n## Immutable source truth\n\n- Repository: `FedorMilovanov/gb-is-my-strength`\n- Source `main`: `43d8672f59128de816cfd47c638c132a73d71599`\n- Landed transaction: PR #104, Reader R5 unified overlay runtime\n- Exact deployed SHA: **not independently witnessed; keep `PROD-STALE-DEPLOY-RED` open**\n\n## What changed after `3a715551`\n\n- Added one protected `window.OverlayRuntime` / `SiteUtils.OverlayRuntime` owner store.\n- Added named/reference-counted scroll owners and an ordered overlay stack.\n- Added exact restoration of pre-existing body/html styles, classes, attributes and scroll position.\n- Centralized focus trapping, exact opener return and top-layer-only Escape handling.\n- Added nested inert/aria claims, idempotent reopen and pagehide/beforeunload recovery.\n- Replaced the second private `site.js` scroll-lock implementation with canonical delegates.\n- Migrated ReaderSettings, Hermenevtika mobile TOC and shared Gill/series TOC, learning, settings and GBS2 sheets.\n- Removed transaction-only workflows, patchers, triggers and raw inventory before merge.\n\n## Verified gates on PR #104 final head `6e31ec54`\n\n- Shared Files Guard and overlay static contracts: PASS\n- Route Registry Validators: PASS\n- Native Source Contract: PASS\n- Astro type/template check: PASS\n- production-like dist and native article/series output: PASS\n- strict migration metadata, workflow policy and tracked-tree mutation check: PASS\n- Chromium nested forward/reverse ownership witness: PASS\n- Firefox nested forward/reverse ownership witness: PASS\n- WebKit nested forward/reverse ownership witness: PASS\n- exact scroll/style/focus restoration, inert, Escape, pagehide and reduced-motion cases: PASS\n\n## Current architecture boundary\n\n- Reader overlays use one canonical runtime and no longer own direct body scroll writers.\n- `SeriesReaderChrome` remains the public series/book façade.\n- Reader R1 remains the global preferences authority.\n- Public surface profiles from R4 remain the route classification authority.\n- Issue #58 remains open only for special map/3D adapters; do not reopen the reader portion without fresh negative evidence.\n\n## Remaining material risks\n\n1. Exact deployed SHA proof remains pending.\n2. Special map/3D direct lock writers need a separate adapter lane before issue #58 closes.\n3. Unified progress/bookmarks/notes state remains R6 / issue #59.\n4. Mobile quality/performance sweep remains after platform lifecycle/state work.\n5. Map rendering/data P0/P1, Nagornaya dark-theme debt and owner/freeze zones stay separate lanes.\n'''
          if reverify_path.exists():
              raise SystemExit(f'{reverify_path} already exists')
          reverify_path.write_text(reverify, encoding='utf-8')
          PY

      - name: Validate reconciled truth
        shell: bash
        run: |
          set -euo pipefail
          grep -q '43d8672f59128de816cfd47c638c132a73d71599' projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          grep -q 'Special Overlay Adapters' projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          grep -q 'READER-R5-OVERLAY-RUNTIME-01' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          grep -q 'ЗАКРЫТО (115)' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          test -f projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-21_43d8672f.md
          python3 scripts/check_auditrepo_structure.py
          python3 scripts/validate_audit_repo.py
          git diff --check

      - name: Commit reconciled SSOT and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/_temp-pr-reader-r5-reconcile.yml
          git add projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md \
                  projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md \
                  projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-21_43d8672f.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'reconcile(gb): record Reader R5 at 43d8672f'
          git push origin HEAD:main
