name: Temp archive failure extractor

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and extract archive failure
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/archive-log
          curl -fsSL -L \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            'https://api.github.com/repos/FedorMilovanov/AuditRepo/actions/jobs/89073609133/logs' \
            > /tmp/archive-log/archive.log
          python3 - <<'PY'
          from pathlib import Path
          lines=Path('/tmp/archive-log/archive.log').read_text(encoding='utf-8-sig',errors='replace').splitlines()
          hits=[]
          needles=['git mv','rmdir','cannot','No such file','Directory not empty','fatal:','##[error]']
          for i,line in enumerate(lines):
              if any(needle in line for needle in needles):
                  start=max(0,i-16); end=min(len(lines),i+40)
                  hits.append('\n'.join(lines[start:end]))
          Path('/tmp/archive-log/extract.txt').write_text('\n\n===== HIT =====\n\n'.join(hits),encoding='utf-8')
          print(Path('/tmp/archive-log/extract.txt').read_text())
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: archive-failure-log-${{ github.run_id }}
          path: /tmp/archive-log/**
          retention-days: 3
