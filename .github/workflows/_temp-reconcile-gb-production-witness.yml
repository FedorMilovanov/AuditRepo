name: TEMP Reconcile GB Production Witness

on:
  push:
    branches:
      - reconcile/gb-production-witness-2026-07-22

permissions:
  contents: write

concurrency:
  group: temp-reconcile-gb-production-witness
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: reconcile/gb-production-witness-2026-07-22
          fetch-depth: 0

      - name: Apply exact SSOT reconciliation
        run: python3 scripts/_temp_run_reconcile_gb_production_witness.py

      - name: Verify production evidence and clean patch
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'Source `main`: `942a79eb6d9bd7542e47470260dd3bbd69d533d8`' projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          grep -F 'Pages run `29910271842`' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          grep -F '## ✅ ЗАКРЫТО (118)' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          test -f projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-22_942a79eb_production-witness.md
          ! grep -Fq 'deploy witness pending' projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          git diff --check

      - name: Publish permanent audit files
        shell: bash
        run: |
          set -euo pipefail
          git add \
            projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md \
            projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md \
            projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-22_942a79eb_production-witness.md
          if git diff --cached --quiet; then
            echo 'Permanent reconciliation already materialized.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'reconcile(gb): record exact production witness [audit-witness]'
          git push origin HEAD:reconcile/gb-production-witness-2026-07-22
