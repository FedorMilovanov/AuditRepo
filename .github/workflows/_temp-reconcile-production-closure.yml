name: TEMP Reconcile Production Closure

on:
  push:
    branches:
      - reconcile/production-closure-942a79eb-2026-07-22

permissions:
  contents: write

concurrency:
  group: temp-reconcile-production-closure
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: reconcile/production-closure-942a79eb-2026-07-22
          fetch-depth: 0

      - name: Patch SSOT and create immutable reverify
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('projects/gb-is-my-strength')
          prompt_path = root / 'NEXT_AGENT_PROMPT.md'
          matrix_path = root / 'verified/MASTER_BUG_MATRIX.md'
          reverify_path = root / 'reverify/CURRENT_HEAD_REVERIFY_2026-07-22_942a79eb_production-closure.md'

          prompt = prompt_path.read_text()
          header_pattern = re.compile(
              r'> \*\*Актуально на 2026-07-22\.[\s\S]*?> Новый verified intake:.*?\n',
              re.M,
          )
          header = '''> **Актуально на 2026-07-22. Source `main`: `942a79eb6d9bd7542e47470260dd3bbd69d533d8`.**
> PR #98, #101–#104, #106, #108, #109, #111, #115, #125, #128 и #131 влиты.
> **Production подтверждён:** Pages run `29910271842` успешно опубликовал exact SHA
> `a0c9c025b05eccfce0ab4818da250d05d1b65da0`; пять critical source/live blob
> сравнений PASS. Issue #58 закрыт, временный observer удалён PR #131.
>
> Авторитет по точечным статусам: `verified/MASTER_BUG_MATRIX.md`.
> Current reverify: `reverify/CURRENT_HEAD_REVERIFY_2026-07-22_942a79eb_production-closure.md`.
> Verified Nagornaya intake: `incoming/gpt-5-6-nagornaya-deep-audit/2026-07-22/REPORT.md`.
> Reader R6 Level A research: `FedorMilovanov/Research@291da43d` and source issue #127.
'''
          prompt, n = header_pattern.subn(header, prompt, count=1)
          if n != 1:
              raise SystemExit(f'prompt header replacement count={n}')
          prompt = prompt.replace('# expect 2b67ee8f… or newer', '# expect 942a79eb… or newer')

          deploy_pattern = re.compile(
              r'### Deploy repair — PR #108/#109/#111/#115[\s\S]*?(?=## Current mandatory boundary)',
              re.M,
          )
          deploy_section = '''### Deploy closure — PR #108/#109/#111/#115/#125/#128/#131

- PR #108 (`869558cd`): 62 stale sources / 113 revision mismatches reconciled;
- PR #109 (`1bbebc2d`): read-only revisions + workflow policy block stale deploy inputs;
- PR #111 (`372eba5b`): readiness workflow name linked to Pages deploy;
- PR #115 (`2b67ee8f`): stale Gill mobile smoke expectation corrected;
- PR #125 (`e4cf04ab`): readiness became the sole automatic deploy owner; deploy checks out exact `workflow_run.head_sha`;
- initial exact-SHA Pages run exposed only a stale SW cache baseline;
- PR #128 (`a0c9c025`): v191 SW baseline synchronized without changing runtime `sw.js`;
- readiness run `29909598796`: success;
- Pages run `29910271842`: success for exact `a0c9c025`;
- production blob witness: 5/5 PASS (`site-utils`, `site`, floating cluster, MapEngine, committed MindMap app);
- PR #131 (`942a79eb`): temporary observer and trigger removed;
- issue #58: closed completed.

'''
          prompt, n = deploy_pattern.subn(deploy_section, prompt, count=1)
          if n != 1:
              raise SystemExit(f'deploy section replacement count={n}')

          boundary_pattern = re.compile(
              r'## Current mandatory boundary — finish production witness[\s\S]*?(?=## Prepared but not landed)',
              re.M,
          )
          boundary = '''## Current mandatory boundary — Nagornaya runtime P0

Production boundary is complete and must not be reopened without a fresh negative live witness.
The next isolated source lane is clean draft PR #126:

1. restore canonical `nagornaya-bar-extras.js` revision in five native footers;
2. materialize the asset in five checked-in shadow pages;
3. harden Astro cache-bust matching against arbitrary stale `?v=` values;
4. retain the 11 machine-generated Baptist PageHead revision reconciliations exposed by the stronger matcher;
5. rerun exact standard CI against current `main`, then merge.

After #126, apply pastoral safety issue #117 from a fresh main because both lanes touch Part V shadow HTML.
Do not combine runtime asset, pastoral wording, source integrity or epistemic UI in one PR.

'''
          prompt, n = boundary_pattern.subn(boundary, prompt, count=1)
          if n != 1:
              raise SystemExit(f'boundary replacement count={n}')

          highlights_pattern = re.compile(
              r'## Prepared but not landed — highlights / issue #112 / PR #113[\s\S]*?(?=## New verified Nagornaya lanes)',
              re.M,
          )
          highlights = '''## Prepared but not landed — highlights / issue #112

The old matrix incorrectly credited dedupe/ARIA to PR #95. Current production still lacks it.
Draft PR #120 proves the logical fix but is based on stale `c702f06e` and must not be merged as-is.
A clean branch from `a0c9c025` is materializing:

- normalized quote text and canonical route path;
- legacy compaction and same-page duplicate prevention;
- same quotation on another route remains separate;
- 200-item cap preserved;
- dialog `aria-hidden` initial/open/close state synchronized;
- permanent dependency-free regression in Shared Files Guard;
- fresh cache-bust generation and full static-publication barrier.

Merge only a cleaned current-main PR with no temporary workflow/trigger and close issue #112 afterward.

'''
          prompt, n = highlights_pattern.subn(highlights, prompt, count=1)
          if n != 1:
              raise SystemExit(f'highlights replacement count={n}')

          bar_pattern = re.compile(
              r'### P0 — `NG-RUNTIME-BAR-ASSET-01`[\s\S]*?(?=### P0 pastoral safety)',
              re.M,
          )
          bar = '''### P0 — `NG-RUNTIME-BAR-ASSET-01`

Clean successor PR #126 is prepared and fully verified:

- five Part I–V native footers use canonical `nagornaya-bar-extras.js` revision;
- five shadow pages include `mobile-toc → bar-extras → floating-cluster`;
- `cache-bust.js` catches arbitrary stale Astro query revisions;
- permanent source/adversarial and Chromium contracts are wired into CI;
- 11 Baptist PageHead files are generated revision reconciliation only;
- final candidate has 25 permanent files and no temporary infrastructure.

Refresh against post-cleanup `main` `942a79eb`, rerun standard CI, then merge before pastoral/source/UI lanes.

'''
          prompt, n = bar_pattern.subn(bar, prompt, count=1)
          if n != 1:
              raise SystemExit(f'bar replacement count={n}')

          r6_pattern = re.compile(
              r'## Reader R6 after current P0 boundaries[\s\S]*?(?=## Other open P0/P1)',
              re.M,
          )
          r6 = '''## Reader R6 after current P0 boundaries

Implementation authority: source issue #127. Level A research landed in
`FedorMilovanov/Research@291da43d`.

Verified current owners:

- `BookmarkEngine` = progress/resume/completed, not manual ribbon bookmarks;
- `gb-favorites` = explicit saved materials;
- `GBHighlights` = quotations/notes and canonical overlay;
- `GillLearningSheet` is a consumer, not a second notes store.

Required sequence: R6.1 inventory/route identity/migration contracts → progress façade → favorites façade → notes index adapter → only then unified library UI. Preserve existing data and keep R6 separate from Nagornaya work.

'''
          prompt, n = r6_pattern.subn(r6, prompt, count=1)
          if n != 1:
              raise SystemExit(f'R6 replacement count={n}')
          prompt_path.write_text(prompt)

          matrix = matrix_path.read_text()
          matrix = re.sub(r'^\| Source HEAD \|.*$', '| Source HEAD | `942a79eb6d9bd7542e47470260dd3bbd69d533d8` (main; single-owner exact-SHA deploy topology, v191 SW baseline, successful production witness and observer cleanup landed) |', matrix, count=1, flags=re.M)
          matrix = re.sub(r'^\| Deploy \|.*$', '| Deploy | 🟢 **PRODUCTION VERIFIED.** Readiness `29909598796` succeeded; Pages `29910271842` successfully deployed exact `a0c9c025b05eccfce0ab4818da250d05d1b65da0`; 5/5 critical source/live SHA-256 comparisons PASS. Issue #58 closed. Temporary observer removed by PR #131 (`942a79eb`). |', matrix, count=1, flags=re.M)
          matrix = re.sub(r'^\| Last reverify \|.*$', '| Last reverify | `reverify/CURRENT_HEAD_REVERIFY_2026-07-22_942a79eb_production-closure.md` |', matrix, count=1, flags=re.M)
          matrix = matrix.replace('⚠️ Старые 2026-07-14/20/21 deploy-формулировки ниже исторические. Текущий source/release authority — `reverify/CURRENT_HEAD_REVERIFY_2026-07-22_2b67ee8f_nagornaya-deep-audit.md`; exact production deployment остаётся отдельным доказательством.', '⚠️ Старые deploy-формулировки ниже исторические. Текущий production authority — `reverify/CURRENT_HEAD_REVERIFY_2026-07-22_942a79eb_production-closure.md`; reopening requires a fresh negative live witness.')

          closure_ids = {
              'PROD-STALE-DEPLOY-RED',
              'CI-DEPLOY-SINGLE-OWNER-01',
              'SW-CACHE-V191-BASELINE-01',
              'PROD-OBSERVER-CLEANUP-01',
          }
          lines = matrix.splitlines()
          lines = [line for line in lines if not any(line.startswith(f'| {item} |') for item in closure_ids)]
          matrix = '\n'.join(lines) + '\n'

          new_rows = [
              '| PROD-OBSERVER-CLEANUP-01 | ✅ **FIXED 2026-07-22.** After immutable Pages/blob evidence, the temporary observer workflow and trigger were deleted with no product/runtime changes. | `942a79eb` PR#131 |',
              '| SW-CACHE-V191-BASELINE-01 | ✅ **FIXED 2026-07-22.** The only blocker after the exact-SHA production build was a stale expected SW cache baseline; baseline v6 now matches committed `gb-v191-reader-preferences-20260721`, while `sw.js` itself was not bumped again. | `a0c9c025` PR#128 |',
              '| CI-DEPLOY-SINGLE-OWNER-01 | ✅ **FIXED 2026-07-22.** Every main push enters readiness once; Pages has no direct push entry and automatically checks out the exact successful `workflow_run.head_sha`, eliminating mixed-commit races and moving-main publication. | `e4cf04ab` PR#125 |',
              '| PROD-STALE-DEPLOY-RED | ✅ **CLOSED 2026-07-22 — PRODUCTION VERIFIED.** Readiness `29909598796` and Pages `29910271842` succeeded for exact `a0c9c025`; source/live hashes match for site-utils, site, floating cluster, MapEngine and committed MindMap app. Issue #58 closed completed. | deployed `a0c9c025`; cleanup `942a79eb` |',
          ]
          closed_heading = re.search(r'^## ✅ ЗАКРЫТО \(\d+\)$', matrix, re.M)
          if not closed_heading:
              raise SystemExit('closed heading not found')
          closed_start = closed_heading.end()
          header_pos = matrix.find('|---|---|---|', closed_start)
          if header_pos < 0:
              raise SystemExit('closed table header not found')
          insert_pos = matrix.find('\n', header_pos) + 1
          matrix = matrix[:insert_pos] + '\n'.join(new_rows) + '\n' + matrix[insert_pos:]

          def recount_section(text, heading_pattern):
              match = re.search(heading_pattern, text, re.M)
              if not match:
                  raise SystemExit(f'heading not found: {heading_pattern}')
              start = match.end()
              next_heading = re.search(r'^## ', text[start:], re.M)
              end = start + next_heading.start() if next_heading else len(text)
              section = text[start:end]
              rows = [line for line in section.splitlines() if line.startswith('| ') and not line.startswith('| ID ') and not line.startswith('|---')]
              return match, len(rows)

          closed_match, closed_count = recount_section(matrix, r'^## ✅ ЗАКРЫТО \(\d+\)$')
          matrix = matrix[:closed_match.start()] + f'## ✅ ЗАКРЫТО ({closed_count})' + matrix[closed_match.end():]
          open_match = re.search(r'^## .*ОТКРЫТО \(\d+\)$', matrix, re.M)
          if open_match:
              start = open_match.end()
              next_heading = re.search(r'^## ', matrix[start:], re.M)
              end = start + next_heading.start() if next_heading else len(matrix)
              section = matrix[start:end]
              rows = [line for line in section.splitlines() if line.startswith('| ') and not line.startswith('| ID ') and not line.startswith('|---')]
              matrix = matrix[:open_match.start()] + re.sub(r'\(\d+\)$', f'({len(rows)})', open_match.group(0)) + matrix[open_match.end():]

          log_entry = '''
### 2026-07-22 — production closure `942a79eb`

- PR #125 established one automatic readiness owner and exact verified-SHA checkout.
- PR #128 synchronized the v191 SW cache baseline after all other production gates passed.
- Readiness `29909598796` and Pages `29910271842` succeeded for exact `a0c9c025`.
- Five critical source/live blob comparisons PASS.
- Issue #58 closed completed; PR #131 removed the temporary observer, source head `942a79eb`.
- Next isolated source lane: clean Nagornaya bar asset PR #126, then pastoral #117, highlights #112 and Reader R6 #127.
'''
          if '### 2026-07-22 — production closure `942a79eb`' not in matrix:
              matrix = matrix.rstrip() + '\n\n' + log_entry.strip() + '\n'
          matrix_path.write_text(matrix)

          reverify_path.write_text('''# CURRENT HEAD REVERIFY — production closure 2026-07-22

## Exact source and production truth

- Source `main` after observer cleanup: `942a79eb6d9bd7542e47470260dd3bbd69d533d8`.
- Production payload source: `a0c9c025b05eccfce0ab4818da250d05d1b65da0`.
- Readiness run: `29909598796` — success.
- Pages run: `29910271842` (#1625) — success.
- Issue #58: closed completed.

## Deploy topology proved

PR #125 (`e4cf04ab`) established:

- one automatic entry: `Metadata & IndexNow Readiness`;
- no automatic direct `Deploy to GitHub Pages` push trigger;
- exact automatic checkout of `github.event.workflow_run.head_sha`;
- permanent linkage/policy regression tests.

This prevents mixed source/asset commits from creating competing Pages owners and prevents a newer moving `main` from replacing the verified SHA between readiness and deploy.

## Final SW blocker and correction

The first exact-SHA Pages transaction passed all publication/build/runtime stages and failed only because `migration/sw-cache-version-baseline.json` expected v189 while committed `sw.js` already used v191.

PR #128 (`a0c9c025`) synchronized the baseline to `gb-v191-reader-preferences-20260721` without changing or incrementing `sw.js` again.

## Production blob witness

All source/live SHA-256 prefixes matched:

```text
js/site-utils.js                               9b3e37815942  PASS
js/site.js                                     ce40e214e833  PASS
js/floating-cluster-controller.js              3af716d98204  PASS
karty/_engine/map-engine.js                    a238fd662077  PASS
konfessii/russkij-baptizm/_app/index.html      d4f89fc048f5  PASS
```

## Cleanup

PR #131 (`942a79eb`) deleted exactly:

- `.github/workflows/_temp-capture-pages-deploy-witness.yml`;
- `js/_temp-pages-deploy-witness-trigger.txt`.

No product, runtime or content file changed in cleanup.

## Next governed sequence

1. Refresh and merge clean Nagornaya runtime bar asset PR #126.
2. Rebuild the verified pastoral-safety package from fresh main because it overlaps Part V shadow HTML.
3. Rebuild/merge highlights dedupe + ARIA issue #112 from fresh main.
4. Begin Reader R6.1 from issue #127 and Research `291da43d`.
5. Keep Nagornaya source-integrity and epistemic UI lanes separate.
''')
          PY

      - name: Validate AuditRepo
        run: |
          python3 scripts/check_auditrepo_structure.py
          python3 scripts/validate_audit_repo.py
          git diff --check

      - name: Commit permanent SSOT files
        run: |
          git add \
            projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md \
            projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md \
            projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-22_942a79eb_production-closure.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'reconcile(gb): record verified production closure'
          git push origin HEAD:reconcile/production-closure-942a79eb-2026-07-22
