name: TEMP PR reconcile special overlay and deploy guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'reconcile/special-deploy-matrix-2026-07-21'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply matrix reconciliation
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT='projects/gb-is-my-strength/_temp_reconcile_special_deploy_matrix.py'
          if [ ! -f "$SCRIPT" ]; then
            echo 'Reconciliation already materialized on PR head.'
            exit 0
          fi
          python3 "$SCRIPT"
          git diff --check

          git rm \
            .github/workflows/_temp-reconcile-special-deploy.yml \
            .github/_temp-reconcile-special-deploy-trigger \
            .github/workflows/_temp-reconcile-special-deploy-pr.yml \
            "$SCRIPT" \
            projects/gb-is-my-strength/_temp_reconcile_special_deploy_trigger.txt

          git add projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'reconcile(gb): record special overlays and deploy guard at 1bbebc2d'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
