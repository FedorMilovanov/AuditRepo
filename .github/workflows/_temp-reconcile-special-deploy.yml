name: TEMP reconcile special overlay and deploy guard

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  reconcile:
    if: github.event.head_commit.message == 'chore(audit): reconcile special overlay and deploy guard'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reconcile immutable source truth
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          SOURCE = '1bbebc2d9fcfe8a0af7c32e3a6796379927d48b8'
          SHORT = '1bbebc2d'
          prompt_path = Path('projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md')
          matrix_path = Path('projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md')
          reverify_path = Path('projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-21_1bbebc2d.md')

          def once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          prompt = prompt_path.read_text(encoding='utf-8')
          prompt = once(
              prompt,
              '> **Актуально на 2026-07-21. Source `main`: `43d8672f59128de816cfd47c638c132a73d71599`.**\n> PR #98 (карты), #101 (Reader R1), #102 (Reader R3 façade), #103 (Reader R4 registry) и #104 (Reader R5 overlay runtime) влиты.\n> Source/release gates зелёные на точных PR-head; **exact deployed SHA proof всё ещё pending**.',
              '> **Актуально на 2026-07-21. Source `main`: `1bbebc2d9fcfe8a0af7c32e3a6796379927d48b8`.**\n> PR #98, #101–#104, #106 (special overlay adapters), #108 (asset revision reconciliation) и #109 (pre-merge revision guard) влиты.\n> Source/release gates зелёные; **exact deployed SHA proof всё ещё pending**.',
              'prompt source header',
          )
          prompt = once(
              prompt,
              '> Current reverify: `reverify/CURRENT_HEAD_REVERIFY_2026-07-21_43d8672f.md`.',
              '> Current reverify: `reverify/CURRENT_HEAD_REVERIFY_2026-07-21_1bbebc2d.md`.',
              'prompt reverify pointer',
          )
          prompt = once(prompt, '# expect 43d8672f… or newer', '# expect 1bbebc2d… or newer', 'prompt expected head')

          landed = '''\n### Special Overlay Adapters — PR #106 (`39f6c3ac`)\n\n- MapEngine place panel и nested photo viewer используют отдельные canonical owner IDs;\n- MindMap3D fullscreen, committed built launcher, global image viewer и mobile-menu fallbacks мигрированы;\n- direct production body/html lock writers запрещены постоянным source guard;\n- foreign-owner isolation, double destroy, fallback adapter и built-output witnesses добавлены;\n- Chromium, Firefox и WebKit matrix зелёная; временные diagnostics удалены до merge.\n\n### Deploy revision repair — PR #108 (`869558cd`) и PR #109 (`1bbebc2d`)\n\n- 62 stale source-файла / 113 cache-bust mismatches синхронизированы explicit `--write` транзакцией;\n- runtime blobs PR #106 остались byte-identical, generated diff ограничен HTML/Astro/asset-version;\n- temporary reconciliation workflow удалён до merge;\n- read-only asset revision check и workflow policy теперь блокируют каждый PR;\n- direct/manual deploy больше не проглатывает cache-bust failure через `|| echo`;\n- exact production Pages SHA всё ещё требует отдельного witness.\n'''
          prompt = once(
              prompt,
              '- временные runners, patchers и raw inventory удалены до merge.\n\n## Следующий обязательный SYSTEM lane — Special Overlay Adapters',
              '- временные runners, patchers и raw inventory удалены до merge.\n' + landed + '\n## Следующая обязательная транзакция — exact production witness',
              'insert landed special/deploy sections',
          )

          old_lane = '''## Следующая обязательная транзакция — exact production witness\n\nЗакрыть оставшуюся часть issue #58 для `special`-поверхностей, не меняя географию,\nвизуальный стиль или бизнес-логику карт/3D.\n\nЦели lane:\n\n1. Повторно инвентаризировать только production direct writers вне canonical runtime:\n   `karty/_engine/map-engine.js`, 3D/MindMap consumers и built-app adapters.\n2. Подключить их к `OverlayRuntime` через узкие special adapters с отдельными owner IDs.\n3. Удалить direct body/html overflow/position/top writers и локальные competing Escape handlers.\n4. Сохранить существующие DOM/CSS/selectors, map camera, gestures и modal visuals.\n5. Добавить browser witnesses: photo/gallery nested over place panel, map sheet + global reader overlay,\n   Escape top-only, exact focus/scroll restore, pagehide/destroy и mobile landscape.\n6. Расширить static guard так, чтобы direct lock writers оставались только в canonical module/bridge.\n7. После полного special-surface parity закрыть issue #58; только затем переходить к R6.\n\n**Не смешивать** с MAP-P0/P1 rendering fixes, layer/theme work, reader state R6,\nконтентом, визуальным redesign или compatibility-key cleanup.\n'''
          new_lane = '''## Следующая обязательная транзакция — exact production witness\n\nSource implementation issue #58 завершена, но production claim требует отдельного доказательства.\n\n1. Получить immutable GitHub Pages deployment/run witness для current `main` или более нового SHA.\n2. Проверить, что production HTML ссылается на актуальные revision hashes, а опубликованные\n   `site-utils.js`, `site.js`, floating cluster, MapEngine и MindMap blobs соответствуют source.\n3. Только после этого закрыть `PROD-STALE-DEPLOY-RED` и issue #58 с run/deployment evidence.\n4. Затем перейти к R6 / issue #59: единое progress/bookmarks/notes state без нового движка.\n\nНе смешивать witness-транзакцию с map rendering/data P0/P1, визуальным redesign или content edits.\n'''
          prompt = once(prompt, old_lane, new_lane, 'replace completed special lane')
          prompt = once(prompt, '## После special adapters', '## После production witness', 'after-lane heading')
          prompt = once(
              prompt,
              'Special overlay adapter lane не должен исправлять map rendering/data defects.',
              'Special overlay runtime source-complete; production witness не должен исправлять map rendering/data defects.',
              'map boundary',
          )
          prompt_path.write_text(prompt, encoding='utf-8')

          matrix = matrix_path.read_text(encoding='utf-8')
          matrix = once(
              matrix,
              '| Source HEAD | `43d8672f59128de816cfd47c638c132a73d71599` (main; PR #98 maps, PR #101 Reader R1, PR #102 Reader R3, PR #103 Reader R4 and PR #104 Reader R5 landed) |',
              '| Source HEAD | `1bbebc2d9fcfe8a0af7c32e3a6796379927d48b8` (main; Reader R1–R5, special overlay adapters, asset revision repair and pre-merge deploy guard landed) |',
              'matrix source head',
          )
          matrix = once(
              matrix,
              '| Deploy | 🟠 **SOURCE/RELEASE GATES GREEN THROUGH `43d8672f` / EXACT DEPLOYED SHA PROOF PENDING.** PR #104 passed Shared Files Guard, Route Registry Validators, Native Source Contract, Astro, production-like dist, native output, workflow policy, clean-tree and Chromium/Firefox/WebKit overlay matrix. |',
              '| Deploy | 🟠 **SOURCE/RELEASE GATES GREEN THROUGH `1bbebc2d` / EXACT DEPLOYED SHA PROOF PENDING.** PR #106 passed static + Chromium/Firefox/WebKit special-overlay evidence; PR #108 restored synchronized asset revisions; PR #109 made revision/workflow checks pre-merge and direct-deploy blocking. |',
              'matrix deploy',
          )
          matrix = once(
              matrix,
              '| Last reverify | `reverify/CURRENT_HEAD_REVERIFY_2026-07-21_43d8672f.md` |',
              '| Last reverify | `reverify/CURRENT_HEAD_REVERIFY_2026-07-21_1bbebc2d.md` |',
              'matrix reverify',
          )
          matrix = once(
              matrix,
              'Текущий source/release authority — `reverify/CURRENT_HEAD_REVERIFY_2026-07-21_43d8672f.md`;',
              'Текущий source/release authority — `reverify/CURRENT_HEAD_REVERIFY_2026-07-21_1bbebc2d.md`;',
              'matrix authority pointer',
          )
          matrix = once(matrix, '## ✅ ЗАКРЫТО (115)', '## ✅ ЗАКРЫТО (118)', 'closed count')
          matrix = once(
              matrix,
              '| READER-R5-OVERLAY-RUNTIME-01 |',
              '| CI-ASSET-REVISION-PREMERGE-01 | ✅ **FIXED 2026-07-21.** Every PR now runs read-only cache-bust and workflow-policy contracts in Shared Files Guard; direct/manual deploy treats stale revisions as blocking instead of swallowing failure. | `1bbebc2d` PR#109 |\n| DEPLOY-CACHE-BUST-RECONCILE-01 | ✅ **FIXED 2026-07-21.** 62 stale HTML/Astro/helper sources and 113 publication mismatches were regenerated through explicit `--write`, then proved idempotent; special-overlay runtime blobs remained unchanged. | `869558cd` PR#108 |\n| SPECIAL-OVERLAY-ADAPTERS-01 | ✅ **FIXED 2026-07-21.** MapEngine, MindMap3D/built launcher, image viewer and mobile fallbacks use canonical OverlayRuntime ownership; zero forbidden direct production writers; foreign-owner/double-destroy/fallback/built witnesses and Chromium/Firefox/WebKit matrix green. | `39f6c3ac` PR#106 |\n| READER-R5-OVERLAY-RUNTIME-01 |',
              'insert closed rows',
          )
          matrix = once(
              matrix,
              '| PROD-STALE-DEPLOY-RED | 🟠 **2026-07-21 REVERIFY:** source/release gates green at `ffdba149` after PR #98/#101, including cross-engine Chromium and engine:sweep 98/98. Keep open only as exact deployed-SHA witness task. | verified-source + verified-pr-gates; deploy witness pending |',
              '| PROD-STALE-DEPLOY-RED | 🟠 **2026-07-21 REVERIFY:** source/release gates green through `1bbebc2d`; special overlays and asset revisions are source-complete, and recurrence is blocked pre-merge. Keep open only for immutable GitHub Pages run/deployment SHA plus production blob witness. | PR#106/#108/#109 verified; deploy witness pending |',
              'update deploy witness row',
          )

          session = '''\n\n### 2026-07-21 — Special overlays and deploy revision hardening (`1bbebc2d`)\n\n- PR #106 (`39f6c3ac`) completed canonical special-surface overlay ownership with zero forbidden direct writers and Chromium/Firefox/WebKit evidence.\n- PR #108 (`869558cd`) reconciled 62 generated source files / 113 stale revision mismatches without changing runtime blobs.\n- PR #109 (`1bbebc2d`) added read-only revision + workflow-policy checks to every PR and made direct deploy strict.\n- Source/release gates are green. Exact Pages deployment SHA remains unverified; `PROD-STALE-DEPLOY-RED` and issue #58 remain open only for that witness.\n'''
          if '### 2026-07-21 — Special overlays and deploy revision hardening (`1bbebc2d`)' in matrix:
              raise SystemExit('session entry already exists')
          matrix = matrix.rstrip() + session
          matrix_path.write_text(matrix, encoding='utf-8')

          reverify = '''# CURRENT HEAD REVERIFY — 2026-07-21 — `1bbebc2d`\n\n## Immutable source truth\n\n- Repository: `FedorMilovanov/gb-is-my-strength`\n- Source `main`: `1bbebc2d9fcfe8a0af7c32e3a6796379927d48b8`\n- Landed transactions: PR #106 special overlay adapters, PR #108 revision reconciliation, PR #109 pre-merge/deploy guard\n- Exact deployed SHA: **not independently witnessed; keep `PROD-STALE-DEPLOY-RED` open**\n\n## What changed after `43d8672f`\n\n### PR #106 — special overlay adapters (`39f6c3ac`)\n\n- Map place panel/photo nesting, MindMap3D fullscreen and committed built launcher use canonical owner IDs.\n- Global image viewer and mobile-menu fallback writers delegate to OverlayRuntime.\n- Direct production body/html lock writers are forbidden outside the canonical runtime/bridge.\n- Foreign-owner isolation, double destroy, fallback MapEngine and built-output witnesses were added.\n- Chromium, Firefox and WebKit special-overlay matrix passed.\n\n### PR #108 — deploy revision reconciliation (`869558cd`)\n\n- Read-only production reproduction found 62 stale source files / 113 revision mismatches.\n- Explicit `node scripts/cache-bust.js --write` changed only generated HTML/Astro/helper outputs.\n- Subsequent read-only check, publication, production-like build, ownership, URL contract, JSON-LD and writer guards passed.\n- `js/site.js`, `karty/_engine/map-engine.js` and normalized MindMap app remained behaviorally unchanged.\n- Temporary transaction workflow was removed before the permanent merge.\n\n### PR #109 — permanent prevention (`1bbebc2d`)\n\n- Every PR runs read-only asset revision drift and workflow-policy checks in Shared Files Guard.\n- Direct/manual Pages deploy no longer swallows a stale revision failure.\n- Workflow-only changes cannot bypass actionlint or workflow policy.\n- No write permission, generator behavior or runtime implementation was added.\n\n## Verified gates\n\n- PR #106 static source contracts and Chromium/Firefox/WebKit special-overlay matrix: PASS\n- PR #108 Shared Files Guard, Route Registry, Native Source, Astro/build and Chromium/Firefox/WebKit: PASS\n- PR #109 asset revision, workflow policy, runtime/overlay/map/reader/facade, shared-files guard and actionlint: PASS\n- Exact current GitHub Pages deployment/run SHA: PENDING\n\n## Current architecture boundary\n\n- `series` covers flat series and `seriesShape=book`; there is no fifth book engine.\n- `SeriesReaderChrome` is the public series/book façade.\n- Reader preferences and overlay lifecycle are global shared infrastructure.\n- `special` surfaces use canonical adapters without owning a second scroll-lock implementation.\n- Mass query-string rewriting remains a migration bridge; generated manifest work belongs to #56/#64.\n\n## Next transaction\n\n1. Obtain immutable Pages run/deployment SHA and verify production revision/runtime blobs.\n2. Only then close `PROD-STALE-DEPLOY-RED` and issue #58.\n3. Proceed to R6 / issue #59 unified progress, bookmarks and notes state.\n4. Keep map data/render P0/P1, visual redesign and content edits in separate lanes.\n'''
          if reverify_path.exists():
              raise SystemExit(f'{reverify_path} already exists')
          reverify_path.write_text(reverify, encoding='utf-8')
          PY

          git diff --check
          git diff -- projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md \
            projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md \
            projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-21_1bbebc2d.md

      - name: Commit reconciled SSOT and retire workflow
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/_temp-reconcile-special-deploy.yml
          git add projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md \
            projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md \
            projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-21_1bbebc2d.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'reconcile(gb): record special overlays and deploy guard at 1bbebc2d'
          git push origin HEAD:main
