name: TEMP run Reader R1 reconciliation

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Load deterministic patch from reconciliation branch
        shell: bash
        run: |
          git fetch origin reconcile/reader-r1-ffdba149-2026-07-21
          git show origin/reconcile/reader-r1-ffdba149-2026-07-21:.github/workflows/_temp-reconcile-reader-r1.yml > /tmp/reconcile.yml
          python3 - <<'PY'
          from pathlib import Path

          lines = Path('/tmp/reconcile.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(lines) if "python3 - <<'PY'" in line)
          end = next(i for i in range(start + 1, len(lines)) if lines[i].strip() == 'PY')
          code = []
          for line in lines[start + 1:end]:
              code.append(line[10:] if line.startswith('          ') else line)
          Path('/tmp/reconcile.py').write_text('\n'.join(code) + '\n', encoding='utf-8')
          PY
          python3 /tmp/reconcile.py
      - name: Validate resulting truth
        run: |
          grep -q 'ffdba1496b66a18b16feaa231af5922d118dc3f8' projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          grep -q 'ffdba1496b66a18b16feaa231af5922d118dc3f8' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          test -f projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-21_ffdba149.md
          ! grep -q '| MAP-P0-06 | 🆕' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          ! grep -q '| MAP-P0-07 | 🆕' projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
      - name: Commit reconciled SSOT and remove workflow
        shell: bash
        run: |
          git rm .github/workflows/_temp-run-reader-r1-reconcile.yml
          git add projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md \
                  projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md \
                  projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-21_ffdba149.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'reconcile(gb): record Reader R1 at ffdba149'
          git push origin HEAD:main
