name: Temp source deploy diagnosis

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Query readiness and Pages for current source main
        shell: bash
        run: |
          mkdir -p /tmp/deploy-diagnosis
          curl -fsSL -H 'Accept: application/vnd.github+json' \
            'https://api.github.com/repos/FedorMilovanov/gb-is-my-strength/commits/main' \
            > /tmp/deploy-diagnosis/source-main.json
          for workflow in indexnow.yml deploy.yml; do
            curl -fsSL -H 'Accept: application/vnd.github+json' \
              "https://api.github.com/repos/FedorMilovanov/gb-is-my-strength/actions/workflows/$workflow/runs?per_page=100" \
              > "/tmp/deploy-diagnosis/$workflow.runs.json"
          done
          python3 - <<'PY'
          from pathlib import Path
          import json, urllib.request
          root=Path('/tmp/deploy-diagnosis')
          target=json.loads((root/'source-main.json').read_text())['sha']
          required_ancestor='6fe9be4064ffa4d50549607f89a9d2ca2f42c2f5'
          compare_url=f'https://api.github.com/repos/FedorMilovanov/gb-is-my-strength/compare/{required_ancestor}...{target}'
          req=urllib.request.Request(compare_url,headers={'Accept':'application/vnd.github+json','User-Agent':'AuditRepo-current-truth'})
          with urllib.request.urlopen(req) as response:
              comparison=json.load(response)
          summary={
              'target':target,
              'required_ancestor':required_ancestor,
              'ancestor_status':comparison.get('status'),
              'ahead_by':comparison.get('ahead_by'),
          }
          if comparison.get('status') not in {'ahead','identical'}:
              raise SystemExit(f'Release fix {required_ancestor} is not an ancestor of current main {target}')
          for workflow in ['indexnow.yml','deploy.yml']:
              data=json.loads((root/f'{workflow}.runs.json').read_text())
              all_runs=[]
              for run in data.get('workflow_runs',[]):
                  row={key:run.get(key) for key in ['id','name','event','status','conclusion','head_sha','head_branch','run_number','created_at','updated_at','html_url','jobs_url']}
                  all_runs.append(row)
              exact=[r for r in all_runs if r['head_sha']==target]
              summary[workflow]={'exact':exact,'latest':all_runs[:12]}
              for run in exact:
                  req=urllib.request.Request(run['jobs_url'],headers={'Accept':'application/vnd.github+json','User-Agent':'AuditRepo-current-truth'})
                  with urllib.request.urlopen(req) as response:
                      jobs=json.load(response)
                  normalized=[]
                  for job in jobs.get('jobs',[]):
                      normalized.append({
                          'id':job.get('id'),'name':job.get('name'),'status':job.get('status'),'conclusion':job.get('conclusion'),
                          'started_at':job.get('started_at'),'completed_at':job.get('completed_at'),
                          'steps':[{k:step.get(k) for k in ['name','status','conclusion','number']} for step in job.get('steps',[])]
                      })
                  (root/f"{workflow}.{run['id']}.jobs.json").write_text(json.dumps(normalized,indent=2),encoding='utf-8')
          (root/'summary.json').write_text(json.dumps(summary,indent=2),encoding='utf-8')
          print(json.dumps(summary,indent=2))
          PY

      - name: Witness live semantic and ARIA markers
        shell: bash
        run: |
          set +e
          stamp="$(date +%s)"
          curl -fsSL --retry 3 "https://gospod-bog.ru/nagornaya/chast-1/?witness=$stamp" > /tmp/chast1.html
          c1=$?
          curl -fsSL --retry 3 "https://gospod-bog.ru/nagornaya/chast-4/?witness=$stamp" > /tmp/chast4.html
          c4=$?
          {
            echo "curl_chast1=$c1"
            echo "curl_chast4=$c4"
            for marker in nagornaya-matthew-luke-observation-matrix nagornaya-part4-green-model nagornaya-part4-thomas-model; do
              if grep -Fq "$marker" /tmp/chast1.html /tmp/chast4.html; then echo "$marker=present"; else echo "$marker=absent"; fi
            done
            for file in /tmp/chast1.html /tmp/chast4.html; do
              if grep -Eq 'class="gb-ember nag-sidebar-ember"[^>]+aria-haspopup="dialog"[^>]+aria-expanded="false"' "$file"; then
                echo "$(basename "$file")_premium_aria=present"
              else
                echo "$(basename "$file")_premium_aria=absent"
              fi
            done
            sha256sum /tmp/chast1.html /tmp/chast4.html
          } | tee /tmp/deploy-diagnosis/live-witness.log

      - name: Upload deploy diagnosis
        uses: actions/upload-artifact@v4
        with:
          name: source-deploy-diagnosis-${{ github.run_id }}
          path: /tmp/deploy-diagnosis/**
          if-no-files-found: error
          retention-days: 3
