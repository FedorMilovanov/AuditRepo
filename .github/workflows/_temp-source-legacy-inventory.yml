name: Temp source legacy inventory

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Checkout current source main
        uses: actions/checkout@v4
        with:
          repository: FedorMilovanov/gb-is-my-strength
          ref: main
          path: source-current
          fetch-depth: 1

      - name: Inventory runtime legacy, references and orphan candidates
        shell: bash
        run: |
          mkdir -p reports/source-legacy
          cd source-current
          node - <<'JS' > ../reports/source-legacy/route-import-legacy.json
          const fs=require('fs');
          const {loadRouteRecords}=require('./scripts/lib/route-source-contract');
          const loaded=loadRouteRecords();
          const rows=loaded.records.map((record)=>({
            route:record.route,
            status:record.owner?.status||null,
            source:record.sourceRel||null,
            migrationMode:record.profile?.migrationMode||null,
            scope:record.profile?.scope||null,
            legacyPath:record.profile?.legacyPath||null,
            legacyPathExists:Boolean(record.profile?.legacyPath && fs.existsSync(record.profile.legacyPath)),
            legacyMarkers:record.inspection?.legacyMarkers||[],
            imports:(record.inspection?.imports||[]).filter(item=>
              /(?:_legacy|legacy|\?raw)/i.test(`${item.specifier||''} ${item.resolved||''}`)
            ),
          }));
          const report={
            sourceSha:require('child_process').execFileSync('git',['rev-parse','HEAD'],{encoding:'utf8'}).trim(),
            productionRoutes:rows.filter(r=>r.status==='production-dist').length,
            strictNativeWithLegacyMarkers:rows.filter(r=>r.status==='production-dist'&&r.migrationMode?.startsWith('strict-native')&&r.legacyMarkers.length),
            productionWithLegacyImports:rows.filter(r=>r.status==='production-dist'&&r.imports.length),
            legacyReferenceProfiles:rows.filter(r=>r.legacyPath),
          };
          console.log(JSON.stringify(report,null,2));
          JS

          python3 - <<'PY'
          from pathlib import Path
          import collections, json, re, subprocess

          root=Path('.')
          tracked=subprocess.check_output(['git','ls-files'],text=True).splitlines()
          text_ext={'.html','.astro','.md','.mdx','.js','.mjs','.cjs','.ts','.tsx','.jsx','.json','.yml','.yaml','.css'}
          candidates=[]
          temp_files=[]
          legacy_files=[]
          for rel in tracked:
              p=Path(rel)
              low=rel.lower()
              if '/archive/' in f'/{low}/' or low.startswith('archive/'):
                  category='archive'
              elif '/_legacy/' in f'/{low}/' or p.name.startswith('_legacy'):
                  category='legacy-fragment'
              elif 'legacy' in p.name.lower() or '/legacy/' in f'/{low}/':
                  category='legacy-named'
              else:
                  category=None
              if category: legacy_files.append({'path':rel,'category':category})
              if p.name.startswith('_temp') or p.name.startswith('temp-') or '/_temp' in f'/{low}' or '/temp-' in f'/{low}':
                  temp_files.append(rel)

          # Build a conservative reference index from tracked text files.
          references=collections.defaultdict(list)
          for rel in tracked:
              p=Path(rel)
              if p.suffix.lower() not in text_ext or not p.exists(): continue
              try: text=p.read_text(encoding='utf-8',errors='ignore')
              except Exception: continue
              for item in legacy_files:
                  target=item['path']
                  base=Path(target).name
                  if target==rel: continue
                  if target in text or base in text:
                      references[target].append(rel)

          for item in legacy_files:
              rel=item['path']
              refs=sorted(set(references.get(rel,[])))
              candidates.append({**item,'referenceCount':len(refs),'references':refs[:30]})

          report={
              'sourceSha':subprocess.check_output(['git','rev-parse','HEAD'],text=True).strip(),
              'trackedFiles':len(tracked),
              'tempFiles':sorted(temp_files),
              'legacyFiles':candidates,
              'unreferencedLegacyNamed':[item for item in candidates if item['category']!='archive' and item['referenceCount']==0],
              'archiveFilesCount':sum(1 for item in candidates if item['category']=='archive'),
          }
          Path('../reports/source-legacy/file-inventory.json').write_text(json.dumps(report,ensure_ascii=False,indent=2),encoding='utf-8')
          print(json.dumps({
              'sourceSha':report['sourceSha'],
              'tempFiles':report['tempFiles'],
              'legacyFiles':len(candidates),
              'unreferencedLegacyNamed':len(report['unreferencedLegacyNamed']),
              'archiveFilesCount':report['archiveFilesCount'],
          },ensure_ascii=False,indent=2))
          PY

          {
            echo '=== TEMP WORKFLOWS / FILES ==='
            git ls-files | grep -E '(^|/)(_temp|temp-)' || true
            echo '=== LEGACY RUNTIME TOKENS ==='
            git grep -n -E 'loadLegacyFullDocument|\?raw|_legacy/' -- '*.astro' '*.js' '*.ts' '*.mdx' || true
            echo '=== TRACKED ARCHIVE DIRECTORIES ==='
            git ls-files | grep -E '(^|/)archive/' | sed 's#/[^/]*$##' | sort -u || true
          } > ../reports/source-legacy/grep-summary.txt

      - name: Run current source contracts
        shell: bash
        run: |
          cd source-current
          node scripts/route-profile-contract-audit.js --strict > ../reports/source-legacy/route-profile-contract.log 2>&1
          node scripts/check-workflows.js > ../reports/source-legacy/workflow-contract.log 2>&1

      - name: Upload legacy inventory
        uses: actions/upload-artifact@v4
        with:
          name: source-legacy-inventory-${{ github.run_id }}
          path: reports/source-legacy/**
          if-no-files-found: error
          retention-days: 7
