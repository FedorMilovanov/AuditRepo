name: Temp sync production current truth

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: temp-sync-production-current-truth-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Synchronize current production truth
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import collections, json, re, textwrap

          project=Path('projects/gb-is-my-strength')
          matrix_path=project/'verified/MASTER_BUG_MATRIX.md'
          next_path=project/'NEXT_AGENT_PROMPT.md'
          archive_dir=project/'archive/stale/2026-07-23-current-truth-cleanup'
          reverify_path=project/'reverify/CURRENT_HEAD_REVERIFY_2026-07-23_83f04647_production.md'
          archive_dir.mkdir(parents=True,exist_ok=True)
          reverify_path.parent.mkdir(parents=True,exist_ok=True)

          source_sha='83f04647c470a92c340d4d7990485c4e1376836b'
          source_short='83f04647'
          readiness='29966152952'
          pages='29966633078'
          witness='29967501124'
          artifact='8548383473'
          live1='d8a15ef9a83ead0dea12f29ad64b6bb0d7904397fecda7abc9de4ea33a79ffeb'
          live4='45168405d3b946a8e1cae295affa75947ca668ed5941f511a5c4096f19b39c6d'

          # Archive the old operational prompt verbatim before replacement.
          old_next=next_path.read_text(encoding='utf-8')
          archived_next=archive_dir/'NEXT_AGENT_PROMPT_PRE_83F04647.md'
          if not archived_next.exists():
              archived_next.write_text(
                  '# Archived NEXT_AGENT_PROMPT before production current-truth sync\n\n'
                  '> Archived 2026-07-23 after exact `83f04647` readiness → Pages → live verification.\n'
                  '> This is historical operational context, not current authority.\n\n'+old_next,
                  encoding='utf-8'
              )

          new_next=f'''# NEXT AGENT PROMPT — gb-is-my-strength

> **Current operational truth only.** Historical prompts are archived under
> `archive/stale/2026-07-23-current-truth-cleanup/`. Bug status and counts belong to
> `verified/MASTER_BUG_MATRIX.md`; this file owns the exact current source/deploy boundary and next execution order.

**Source main:** `{source_sha}`  
**Production:** ✅ exact `{source_short}`  
**Readiness:** `{readiness}` — success  
**Pages:** `{pages}` — success  
**Live witness:** AuditRepo `{witness}` / artifact `{artifact}`

## 1) Proven production boundary

The deployed source is exact `{source_sha}`. It contains these completed waves:

- PR #154 — epistemic comparison UI: merge `f1946b523d45028c17e39ecf1dc6e9b361887401`;
- PR #157 — route semantics: merge `6f412430a21eae411970f8601687c4f99f61e9c4`;
- PR #158 — Nagornaya PremiumControls ARIA release repair: merge `6fe9be4064ffa4d50549607f89a9d2ca2f42c2f5`.

The current production descendant is seven CI/control commits ahead of the release repair. The release SHA is a verified ancestor; no product fix was reverted.

Exact chain:

1. Metadata & IndexNow Readiness `{readiness}` — success on `{source_short}`;
2. Deploy to GitHub Pages `{pages}` — success on the same SHA;
3. all deploy steps passed, including PremiumControls, Gill smokes, broad runtime, content coverage, SW switch, Pages upload/deploy and IndexNow;
4. live HTTP witness found:
   - `nagornaya-matthew-luke-observation-matrix`;
   - `nagornaya-part4-green-model`;
   - `nagornaya-part4-thomas-model`;
   - `aria-haspopup="dialog"` + `aria-expanded="false"` on Nagornaya Play controls;
5. live hashes:
   - `/nagornaya/chast-1/` — `{live1}`;
   - `/nagornaya/chast-4/` — `{live4}`.

Canonical evidence: `reverify/{reverify_path.name}`.

## 2) Completed lanes — do not reopen without current-head evidence

- `NG-UI-EPISTEMIC-BIAS-01` / issue #153 — closed by PR #154; 3428/3428 all-route, 174/174 epistemic UI, 20 before/after PNG.
- `READER-ROUTE-SEMANTICS-01` / issue #146 — closed by PR #157; 3428/3428 all-route, 126/126 route semantics.
- `NG-PREMIUM-CONTROLS-ARIA-01` — closed by PR #158; exact production-like PremiumControls 158/158 and live ARIA witness.

Reader R6 / issue #59 remains a separate future lane and must not be mixed with cleanup or route semantics.

## 3) Active work, in order

1. **AuditRepo current-truth cleanup — PR #28**
   - finish canonical cleanup and remove its last temporary deploy observer;
   - keep all moved evidence under archive paths; do not delete historical witnesses;
   - rerun `check_auditrepo_structure.py`, `validate_audit_repo.py`, and matrix coverage.

2. **Matrix coverage to zero**
   - BAD-COMMIT-REF is already zero after immutable-SHA normalization;
   - remaining debt is orphan claims and unregistered evidence IDs;
   - fix parser false positives first, then register aliases/retired IDs or attach independent current evidence;
   - never satisfy coverage by citing the matrix as its own evidence.

3. **Source legacy/control cleanup — draft PR #159**
   - only three unreferenced superseded audit implementations and one completed lane document;
   - active strangler, `legacyPath` parity references, archives and Gill PR #156 orchestrator remain protected.

4. **Gill PR #156**
   - active draft transaction; its temporary branch orchestrator is not stale until the PR finishes;
   - do not merge unrelated work into that lane.

5. Continue the verified P0/P1 order from `MASTER_BUG_MATRIX.md` after governance cleanup is merged.

## 4) Non-negotiable gates

Before any source merge:

- Shared Files Guard;
- Native Source Contract when source/profile paths are touched;
- Route Registry Validators and browser matrix when public semantics are touched;
- Visual Parity policy when rendered surfaces are touched;
- production-like build and route-specific release gate for deploy blockers.

After any production-impacting merge:

- exact readiness success;
- exact Pages success;
- live marker/hash witness;
- only then update AuditRepo current truth.

## 5) Data hygiene rules

- `PROJECT_REGISTRY.md` is static; never put HEAD or session history there.
- `NEXT_AGENT_PROMPT.md` owns current execution truth.
- `verified/MASTER_BUG_MATRIX.md` owns status/counts.
- `reverify/` owns immutable current-head witnesses.
- superseded intake is moved to `archive/stale/`; fixed rows/evidence to `archive/fixed/`.
- no silent deletion of evidence; Git history alone is not a substitute for a provenance note when moving AuditRepo evidence.
'''
          next_path.write_text(new_next,encoding='utf-8')

          reverify=f'''# Current-head reverify — `{source_short}` production

**Date:** 2026-07-23  
**Source repository:** `FedorMilovanov/gb-is-my-strength`  
**Exact source/deployed SHA:** `{source_sha}`

## Immutable release ancestry

- epistemic UI PR #154 → `f1946b523d45028c17e39ecf1dc6e9b361887401`;
- route semantics PR #157 → `6f412430a21eae411970f8601687c4f99f61e9c4`;
- PremiumControls ARIA PR #158 → `6fe9be4064ffa4d50549607f89a9d2ca2f42c2f5`;
- production descendant → `{source_sha}`.

The release repair is an ancestor of production; seven later commits changed CI/control workflow state and did not revert product files.

## Exact production chain

| Boundary | Run | Result |
|---|---:|---|
| Metadata & IndexNow Readiness | `{readiness}` | success |
| Deploy to GitHub Pages | `{pages}` | success |
| AuditRepo live observer | `{witness}` | success; artifact `{artifact}` |

Pages passed every publication step: static gates, production-like build, ownership, Pagefind, visual parity, publication audit, URL contracts, JSON-LD, rich results, PremiumControls, Gill audits/smokes, broad runtime, content coverage, SW readiness, upload/deploy and IndexNow.

## Live witness

HTTP 200 and required markers were observed on the public domain:

- `nagornaya-matthew-luke-observation-matrix` — present;
- `nagornaya-part4-green-model` — present;
- `nagornaya-part4-thomas-model` — present;
- Nagornaya Play disclosure ARIA — present on parts I and IV.

SHA-256:

- `/nagornaya/chast-1/`: `{live1}`;
- `/nagornaya/chast-4/`: `{live4}`.

## Closed lanes

- `NG-UI-EPISTEMIC-BIAS-01` / #153 — registry-driven neutral comparisons deployed.
- `READER-ROUTE-SEMANTICS-01` / #146 — reading/landing/reference/application/page roles deployed.
- `NG-PREMIUM-CONTROLS-ARIA-01` — disclosure ARIA deployed; PremiumControls release proof 158/158.

## Remaining boundary

This witness proves deployment/current truth, not that the full matrix is zero. AuditRepo matrix coverage still has orphan/unregistered evidence debt and must remain explicitly open until resolved.
'''
          reverify_path.write_text(reverify,encoding='utf-8')

          # Matrix current truth + closed/open transitions.
          matrix=matrix_path.read_text(encoding='utf-8')
          matrix=re.sub(r'^\| Source HEAD \|.*$',f'| Source HEAD | `{source_sha}` (main; #154 epistemic UI, #157 route semantics, #158 PremiumControls ARIA, plus CI/control cleanup) |',matrix,flags=re.M)
          matrix=re.sub(r'^\| Deploy \|.*$',f'| Deploy | ✅ **PRODUCTION VERIFIED @ `{source_short}`.** Readiness `{readiness}` → Pages `{pages}` success on the same SHA; live witness `{witness}` / artifact `{artifact}` found all three epistemic markers and Nagornaya disclosure ARIA. |',matrix,flags=re.M)
          matrix=re.sub(r'^\| Last reverify \|.*$',f'| Last reverify | `reverify/{reverify_path.name}` |',matrix,flags=re.M)
          matrix=re.sub(r'^⚠️ Старые deploy-формулировки.*$',f'⚠️ Старые deploy-формулировки ниже исторические. Current authority: `reverify/{reverify_path.name}`; exact readiness `{readiness}` → Pages `{pages}` → live witness `{witness}`.',matrix,flags=re.M)

          lines=matrix.splitlines()
          removed=[]
          output=[]
          for line in lines:
              if line.startswith('| NG-UI-EPISTEMIC-BIAS-01 |'):
                  removed.append(line); continue
              if line.startswith('| READER-ROUTE-SEMANTICS-01 |'):
                  removed.append(line); continue
              if line.startswith('| NG-PREMIUM-CONTROLS-ARIA-01 |'):
                  removed.append(line); continue
              output.append(line)
          if len([line for line in removed if line.startswith('| NG-UI-EPISTEMIC-BIAS-01 |')])!=1:
              raise SystemExit(f'Expected exactly one open NG-UI row, removed={removed}')

          closed_rows=[
            '| NG-UI-EPISTEMIC-BIAS-01 | ✅ **FIXED/PRODUCTION VERIFIED 2026-07-23.** PR #154 replaced answer-key red/green presentation with registry-driven observation/model/claim comparisons, preserved alternatives before the confessional conclusion, and added permanent schema/mutation/Chromium guards. Pre-merge: 3428/3428 all-route + 174/174 epistemic; live markers present on production. | `f1946b52` |',
            '| READER-ROUTE-SEMANTICS-01 | ✅ **FIXED/PRODUCTION VERIFIED 2026-07-23.** PR #157 introduced orthogonal `routeRole` semantics (reading/landing/reference/application/page), removed `unknown` from production profiles, and prevented landing/reference routes from inheriting reader UI. Pre-merge: 3428/3428 + 126/126; deployed descendant verified. | `6f412430` |',
            '| NG-PREMIUM-CONTROLS-ARIA-01 | ✅ **FIXED/PRODUCTION VERIFIED 2026-07-23.** PR #158 restored `aria-haspopup="dialog"` and initial `aria-expanded="false"` on Nagornaya Play controls I–V, added a permanent Shared Guard regression and removed the obsolete #154 proof job. Release proof 158/158; exact Pages and live ARIA witness green. | `6fe9be40` |',
          ]
          # Insert after closed table header separator.
          insert_at=None
          for index,line in enumerate(output):
              if line.strip()=='|---|---|---|' and index>0 and output[index-1].startswith('| ID | Описание | Коммит |'):
                  insert_at=index+1; break
          if insert_at is None: raise SystemExit('Closed table insertion point not found')
          output[insert_at:insert_at]=closed_rows

          # Append newest session record after Session log guidance.
          session_entry=f'- **2026-07-23 — Production `{source_short}`: #154/#157/#158 deployed and current truth reconciled.** Readiness `{readiness}` and Pages `{pages}` succeeded on exact `{source_sha}`; live observer `{witness}` / artifact `{artifact}` verified epistemic markers and PremiumControls ARIA. AuditRepo cleanup archived superseded intake, normalized immutable closed refs, removed fixed rows from open sections and resolved duplicate IDs. Evidence: `reverify/{reverify_path.name}`.'
          session_index=next((i for i,line in enumerate(output) if line.startswith('> чистым статусом')),None)
          if session_index is None: raise SystemExit('Session log insertion point not found')
          output[session_index+1:session_index+1]=['',session_entry]

          # Recompute all table counts by section.
          strip_count=lambda value: re.sub(r'\s*\(\d+\)\s*$','',value).strip()
          section=None
          section_counts=collections.Counter()
          for line in output:
              if line.startswith('## '): section=strip_count(line[3:])
              if line.startswith('| ') and line.count('|')>=3 and not line.startswith('|---'):
                  cells=[cell.strip() for cell in line.strip('|').split('|')]
                  if cells and cells[0] not in {'ID','Поле','Категория','Статус'}:
                      section_counts[section]+=1
          heading_rx=re.compile(r'^(##\s+.+?)\s*\(\d+\)\s*$')
          normalized=[]
          for line in output:
              match=heading_rx.match(line)
              if match:
                  title=match.group(1)
                  key=strip_count(title[3:])
                  if key in section_counts: line=f'{title} ({section_counts[key]})'
              normalized.append(line)

          # Update statistics from actual section counts.
          closed_count=section_counts.get('✅ ЗАКРЫТО',0)
          p0_count=section_counts.get('🔴 P0/P1 — ОТКРЫТО',0)
          p1_count=section_counts.get('🟠 P1 — ОТКРЫТО',0)
          p2_count=section_counts.get('🟡 P2 — ОТКРЫТО',0)
          p3_count=section_counts.get('🟢 P3 — ОТКРЫТО',0)
          ref_count=section_counts.get('🔵 P3 — РЕФАКТОРИНГ',0)
          audit_count=section_counts.get('🟣 AUDITREPO',0)
          total_open=p0_count+p1_count+p2_count+p3_count+ref_count+audit_count
          stat_replacements={
            'Закрыто (fixed)':str(closed_count),
            '**P0 открыто**':f'**{p0_count}**',
            'P1 открыто':str(p1_count),
            'P2 открыто':str(p2_count),
            'P3 открыто':str(p3_count),
            'Рефакторинг':str(ref_count),
            'AuditRepo':str(audit_count),
            '**Всего открыто (матрица)**':f'**{total_open}**',
          }
          final=[]
          for line in normalized:
              if line.startswith('| ') and line.count('|')>=2:
                  cells=[cell.strip() for cell in line.strip('|').split('|')]
                  if cells and cells[0] in stat_replacements:
                      cells[1]=stat_replacements[cells[0]]
                      line='| '+' | '.join(cells)+' |'
              if line.startswith('## Статистика '):
                  line=f'## Статистика (обновлено 2026-07-23: production {source_short} + current-truth cleanup)'
              final.append(line)
          matrix_path.write_text('\n'.join(final)+'\n',encoding='utf-8')

          report={
            'source':source_sha,'readiness':readiness,'pages':pages,'witness':witness,
            'removedOpenRows':removed,'closedCount':closed_count,
            'p0':p0_count,'p1':p1_count,'p2':p2_count,'p3':p3_count,
            'refactoring':ref_count,'auditRepo':audit_count,'totalOpen':total_open,
          }
          Path('/tmp/current-truth-sync.json').write_text(json.dumps(report,ensure_ascii=False,indent=2),encoding='utf-8')
          print(json.dumps(report,ensure_ascii=False,indent=2))
          PY

      - name: Validate canonical truth
        shell: bash
        run: |
          cat /tmp/current-truth-sync.json
          python3 scripts/check_auditrepo_structure.py
          python3 scripts/validate_audit_repo.py
          python3 scripts/check_matrix_coverage.py > /tmp/matrix-coverage-after-sync.log 2>&1 || true
          if grep -q 'BAD-COMMIT-REF' /tmp/matrix-coverage-after-sync.log; then
            cat /tmp/matrix-coverage-after-sync.log
            echo 'Immutable closed-reference regression' >&2
            exit 1
          fi
          git diff --check

      - name: Commit current production truth
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          cat > /tmp/allowed.txt <<'EOF'
          projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md
          projects/gb-is-my-strength/archive/stale/2026-07-23-current-truth-cleanup/NEXT_AGENT_PROMPT_PRE_83F04647.md
          projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-23_83f04647_production.md
          projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          EOF
          sort -o /tmp/allowed.txt /tmp/allowed.txt
          git add -A
          git diff --cached --name-only | sort > /tmp/staged.txt
          diff -u /tmp/allowed.txt /tmp/staged.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'docs(audit): synchronize exact production current truth'
          git push origin HEAD:"$BRANCH"
