name: AuditRepo Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check structure
        run: python3 scripts/check_auditrepo_structure.py
      - name: Validate repo rules
        run: python3 scripts/validate_audit_repo.py

  matrix-coverage-diagnostic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Measure matrix evidence coverage
        run: |
          mkdir -p reports/matrix-coverage
          python3 scripts/check_matrix_coverage.py \
            --warn-only \
            --verbose \
            --json-out reports/matrix-coverage/report.json \
            | tee reports/matrix-coverage/report.log
          python3 scripts/matrix_coverage_contexts.py \
            --json-out reports/matrix-coverage/contexts.json \
            --markdown-out reports/matrix-coverage/contexts.md
      - name: Upload matrix coverage diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: matrix-coverage-${{ github.run_id }}
          path: reports/matrix-coverage/**
          if-no-files-found: error
          retention-days: 14

  finalize-sitemap-contract:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/close-sitemap-contract-8a535267'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Patch canonical matrix and session log
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md')
          text = path.read_text(encoding='utf-8')

          replacements = {
            '| Source HEAD | `0f5b330799292d995c62bbb7d63a83870d93318e` (main; exact production descendant including #159 legacy cleanup, #160 Atlas path cleanup and #162 final workspace-path cleanup) |':
            '| Source HEAD | `8a5352671375fdb01b6c30273c25ec4283a13f69` (main; exact production, PR #163 registry-driven sitemap contract) |',
            '| Deploy | ✅ **PRODUCTION VERIFIED @ `0f5b3307`.** Readiness `29972524675` → Pages `29972909431` success on the same SHA; all 30 deploy stages passed. The only `a73f609f` → `0f5b3307` change is a source comment, so rendered-output live hashes remain applicable. |':
            '| Deploy | ✅ **PRODUCTION VERIFIED @ `8a535267`.** Readiness `30006414898` → Pages `30007024100` success on the same SHA; live sitemap has 66 `<loc>` entries and SHA-256 `5f3fa280af1ddc73f166decce47535d48ec60718375dd7c0418ea3675f82a801`. |',
            '| Last reverify | `reverify/CURRENT_HEAD_REVERIFY_2026-07-23_0f5b3307_production.md` |':
            '| Last reverify | `reverify/CURRENT_HEAD_REVERIFY_2026-07-23_8a535267_sitemap_contract.md` |',
            '⚠️ Старые deploy-формулировки ниже исторические. Current authority: `reverify/CURRENT_HEAD_REVERIFY_2026-07-23_0f5b3307_production.md`; exact readiness `29972524675` → Pages `29972909431` (all 30 stages green).':
            '⚠️ Старые deploy-формулировки ниже исторические. Current authority: `reverify/CURRENT_HEAD_REVERIFY_2026-07-23_8a535267_sitemap_contract.md`; exact readiness `30006414898` → Pages `30007024100`; live sitemap 66 URLs.',
            '## ✅ ЗАКРЫТО (134)': '## ✅ ЗАКРЫТО (135)',
            '## 🟢 P3 — ОТКРЫТО (56)': '## 🟢 P3 — ОТКРЫТО (55)',
          }
          for old, new in replacements.items():
            count = text.count(old)
            if count not in {0, 1}:
              raise SystemExit(f'unexpected replacement count {count}: {old}')
            text = text.replace(old, new)

          closed_row = '| AUDIT-PRO-SITEMAP-ROOT-ONLY | ✅ **FIXED/PRODUCTION VERIFIED 2026-07-23.** PR #163 removed root-HTML sitemap inference and made the existing effective route registry authoritative: 66 indexable `production-dist` routes are required; only explicit `profile.seo.indexable=false` exempts a production route. Missing Astro-only routes, unregistered/duplicate/foreign/non-canonical URLs are blocking and mutation-tested. Exact readiness `30006414898`, Pages `30007024100`, live sitemap SHA-256 `5f3fa280af1ddc73f166decce47535d48ec60718375dd7c0418ea3675f82a801`. Broader `AUDIT-PRO-ROOT-ONLY` and `SEO-AUDIT-ROOT-ONLY` remain open. | `8a535267` PR#163 |\n'
          closed_anchor = '|---|---|---|\n| AUDIT-ATLAS-DOC-PATH-LEAK |'
          if closed_row not in text:
            if text.count(closed_anchor) != 1:
              raise SystemExit('closed table anchor mismatch')
            text = text.replace(closed_anchor, '|---|---|---|\n' + closed_row + '| AUDIT-ATLAS-DOC-PATH-LEAK |')

          open_row = '| AUDIT-PRO-SITEMAP-ROOT-ONLY | `publicFiles()` проверяет покрытие sitemap по `htmlPages` (root HTML). Если Astro-страница существует только в dist/ (без root-копии), её URL не попадёт в проверку покрытия — sitemap может недосчитаться страниц, а аудит пройдёт. |\n'
          if open_row in text:
            text = text.replace(open_row, '')
          elif closed_row not in text:
            raise SystemExit('open sitemap row missing before closure')

          session = '''\n\n### 2026-07-23 — registry-driven sitemap contract production closure (`8a535267`)\n\n- PR #163 replaced root-HTML sitemap inference with the effective route registry and explicit `seo.indexable=false` policy.\n- Exact pre-merge head passed Shared Files, static registry/audit-pro, production-like build, 3428/3428 public-surface Chromium and 126/126 route semantics.\n- Exact source readiness `30006414898` and Pages `30007024100` succeeded; observer `30006649281` artifact `8563907298` recorded 66 live sitemap URLs and SHA-256 `5f3fa280af1ddc73f166decce47535d48ec60718375dd7c0418ea3675f82a801`.\n- `AUDIT-PRO-SITEMAP-ROOT-ONLY` closed; broader `AUDIT-PRO-ROOT-ONLY` and `SEO-AUDIT-ROOT-ONLY` remain open. Closed count 134 → 135; open P3 count 56 → 55.\n'''
          if '### 2026-07-23 — registry-driven sitemap contract production closure (`8a535267`)' not in text:
            text = text.rstrip() + session

          path.write_text(text, encoding='utf-8')
          PY
          python3 scripts/check_auditrepo_structure.py
          python3 scripts/validate_audit_repo.py
          python3 scripts/check_matrix_coverage.py --verbose --json-out /tmp/matrix-coverage.json
          python3 - <<'PY'
          import json
          report = json.load(open('/tmp/matrix-coverage.json'))
          if report['problems'] != 0:
            raise SystemExit(report)
          print(report)
          PY
          git diff --check
      - name: Commit canonical closure if changed
        shell: bash
        run: |
          git add projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          if git diff --cached --quiet; then
            echo 'Canonical matrix closure already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'docs(audit): close registry-driven sitemap coverage gap'
          git push origin HEAD:"$GITHUB_HEAD_REF"
