name: AuditRepo Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check structure
        run: python3 scripts/check_auditrepo_structure.py
      - name: Validate repo rules
        run: python3 scripts/validate_audit_repo.py

  matrix-coverage-diagnostic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Measure matrix evidence coverage
        run: |
          mkdir -p reports/matrix-coverage
          python3 scripts/check_matrix_coverage.py \
            --warn-only \
            --verbose \
            --json-out reports/matrix-coverage/report.json \
            | tee reports/matrix-coverage/report.log
          python3 scripts/matrix_coverage_contexts.py \
            --json-out reports/matrix-coverage/contexts.json \
            --markdown-out reports/matrix-coverage/contexts.md
      - name: Upload matrix coverage diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: matrix-coverage-${{ github.run_id }}
          path: reports/matrix-coverage/**
          if-no-files-found: error
          retention-days: 14

  reconcile-current-matrix:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 28 && github.event.pull_request.head.repo.full_name == github.repository
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply reviewed reconciliation module
        run: |
          mkdir -p reports/matrix-reconcile
          python3 scripts/reconcile_current_matrix.py \
            | tee reports/matrix-reconcile/run.log
      - name: Prove strict zero coverage
        run: |
          python3 scripts/check_auditrepo_structure.py
          python3 scripts/validate_audit_repo.py
          python3 scripts/check_matrix_coverage.py \
            --verbose \
            --json-out reports/matrix-reconcile/final-coverage.json \
            | tee reports/matrix-reconcile/final-coverage.log
          python3 - <<'PY'
          import json
          report = json.load(open('reports/matrix-reconcile/final-coverage.json'))
          if report['problems'] != 0:
              raise SystemExit(report)
          print(report)
          PY
          git diff --check
      - name: Commit reviewed canonical files
        shell: bash
        run: |
          cat > /tmp/allowed.txt <<'EOF'
          projects/gb-is-my-strength/archive/fixed/2026-07-23-current-truth-cleanup/CURRENT_SOURCE_FORENSIC_CLOSURES.md
          projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          projects/gb-is-my-strength/verified/MATRIX_ID_ALIASES.json
          EOF
          sort -o /tmp/allowed.txt /tmp/allowed.txt
          git add \
            projects/gb-is-my-strength/archive/fixed/2026-07-23-current-truth-cleanup/CURRENT_SOURCE_FORENSIC_CLOSURES.md \
            projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md \
            projects/gb-is-my-strength/verified/MATRIX_ID_ALIASES.json
          git diff --cached --name-only | sort > /tmp/staged.txt
          diff -u /tmp/allowed.txt /tmp/staged.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --cached --quiet; then
            echo 'Canonical reconciliation already applied.'
            exit 0
          fi
          git commit -m 'reconcile(matrix): close exact current findings and reach zero coverage'
          git push origin HEAD:"${{ github.event.pull_request.head.ref }}"
      - name: Upload reconciliation proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-reconcile-${{ github.run_id }}
          path: reports/matrix-reconcile/**
          if-no-files-found: error
          retention-days: 14
