name: AuditRepo Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check structure
        run: python3 scripts/check_auditrepo_structure.py
      - name: Validate repo rules
        run: python3 scripts/validate_audit_repo.py

  matrix-coverage-diagnostic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Measure matrix evidence coverage
        run: |
          mkdir -p reports/matrix-coverage
          python3 scripts/check_matrix_coverage.py \
            --warn-only \
            --verbose \
            --json-out reports/matrix-coverage/report.json \
            | tee reports/matrix-coverage/report.log
      - name: Upload matrix coverage diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: matrix-coverage-${{ github.run_id }}
          path: reports/matrix-coverage/**
          if-no-files-found: error
          retention-days: 14

  reconcile-indexnow-duplicate:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 28 && github.event.pull_request.head.repo.full_name == github.repository
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Remove stale open copy and preserve evidence
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import collections, re

          matrix_path = Path('projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md')
          archive_path = Path('projects/gb-is-my-strength/archive/fixed/2026-07-23-current-truth-cleanup/CANONICAL_DUPLICATE_CI_INDEXNOW.md')
          original = matrix_path.read_text(encoding='utf-8')
          lines = original.splitlines()
          section = ''
          removed = []
          output = []
          for line_no, line in enumerate(lines, 1):
              if line.startswith('## '):
                  section = line[3:].strip()
              if (
                  line.startswith('| CI-INDEXNOW-CHECKER-STALE |')
                  and 'ОТКРЫТО' in section
              ):
                  removed.append((line_no, section, line))
                  continue
              output.append(line)

          if len(removed) == 0 and archive_path.exists():
              Path('/tmp/indexnow-duplicate.changed').write_text('0')
              raise SystemExit(0)
          if len(removed) != 1:
              raise SystemExit(f'expected one stale open copy, found {len(removed)}')

          def strip_count(value):
              return re.sub(r'\s*\(\d+\)\s*$', '', value).strip()

          counts = collections.Counter()
          current = ''
          for line in output:
              if line.startswith('## '):
                  current = strip_count(line[3:].strip())
                  continue
              if not ('ОТКРЫТО' in current or current.startswith('🔴 P0/P1')):
                  continue
              if line.startswith('| ') and not line.startswith('|---'):
                  cells = [cell.strip() for cell in line.strip('|').split('|')]
                  if cells and cells[0] not in {'ID', 'Поле', 'Категория', 'Статус'}:
                      counts[current] += 1

          heading_rx = re.compile(r'^(##\s+.*(?:ОТКРЫТО|P0/P1).*?)\s*\((\d+)\)\s*$')
          normalized = []
          for line in output:
              match = heading_rx.match(line)
              if match:
                  title = match.group(1)
                  key = strip_count(title[3:].strip())
                  line = f'{title} ({counts.get(key, 0)})'
              normalized.append(line)

          matrix_path.write_text('\n'.join(normalized) + '\n', encoding='utf-8')
          archive_path.parent.mkdir(parents=True, exist_ok=True)
          line_no, old_section, old_row = removed[0]
          archive_path.write_text(
              '# Canonical duplicate resolved — CI-INDEXNOW-CHECKER-STALE\n\n'
              'The fixed row remains canonical in `✅ ЗАКРЫТО`. The stale open copy was removed because its own text says the original permissions claim was obsolete and should be closed or retained only as history.\n\n'
              f'- Original line: {line_no}\n'
              f'- Original section: {old_section}\n\n'
              f'{old_row}\n',
              encoding='utf-8',
          )
          Path('/tmp/indexnow-duplicate.changed').write_text('1')
          PY
      - name: Validate canonical uniqueness
        shell: bash
        run: |
          python3 scripts/check_auditrepo_structure.py
          python3 scripts/validate_audit_repo.py
          python3 scripts/check_matrix_coverage.py --warn-only --json-out /tmp/coverage.json
          python3 - <<'PY'
          import json
          report = json.load(open('/tmp/coverage.json'))
          print(report)
          PY
          git diff --check
      - name: Commit duplicate resolution
        shell: bash
        run: |
          if test "$(cat /tmp/indexnow-duplicate.changed)" = 0; then
            echo 'Duplicate already reconciled.'
            exit 0
          fi
          cat > /tmp/allowed.txt <<'EOF'
          projects/gb-is-my-strength/archive/fixed/2026-07-23-current-truth-cleanup/CANONICAL_DUPLICATE_CI_INDEXNOW.md
          projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          EOF
          sort -o /tmp/allowed.txt /tmp/allowed.txt
          git add -A
          git diff --cached --name-only | sort > /tmp/staged.txt
          diff -u /tmp/allowed.txt /tmp/staged.txt
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git commit -m 'cleanup(matrix): remove stale open IndexNow duplicate'
          git push origin HEAD:"${{ github.event.pull_request.head.ref }}"
