name: AuditRepo Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check structure
        run: python3 scripts/check_auditrepo_structure.py
      - name: Validate repo rules
        run: python3 scripts/validate_audit_repo.py

  matrix-coverage-diagnostic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Measure matrix evidence coverage
        run: |
          mkdir -p reports/matrix-coverage
          python3 scripts/check_matrix_coverage.py \
            --warn-only \
            --verbose \
            --json-out reports/matrix-coverage/report.json \
            | tee reports/matrix-coverage/report.log
      - name: Upload matrix coverage diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: matrix-coverage-${{ github.run_id }}
          path: reports/matrix-coverage/**
          if-no-files-found: error
          retention-days: 14

  matrix-id-classification:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 28
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Collect exact contexts for unresolved IDs
        shell: bash
        run: |
          mkdir -p reports/matrix-id-classification
          python3 scripts/check_matrix_coverage.py \
            --warn-only \
            --json-out reports/matrix-id-classification/coverage.json \
            > reports/matrix-id-classification/coverage.log
          python3 - <<'PY'
          from pathlib import Path
          import json, re

          project = Path('projects/gb-is-my-strength')
          coverage = json.loads(Path('reports/matrix-id-classification/coverage.json').read_text())
          ids = []
          diagnostic_rx = re.compile(
              r'^UNREGISTERED-EVIDENCE: reverify explicitly registers ([A-Z0-9][A-Za-z0-9-]+) '
          )
          for diagnostic in coverage['diagnostics']:
              match = diagnostic_rx.match(diagnostic)
              if match:
                  ids.append(match.group(1))
          ids = sorted(set(ids))

          contexts = {finding_id: [] for finding_id in ids}
          roots = [project / 'reverify', project / 'incoming', project / 'working', project / 'archive']
          for root in roots:
              if not root.exists():
                  continue
              for path in root.rglob('*.md'):
                  lines = path.read_text(encoding='utf-8', errors='ignore').splitlines()
                  for line_no, line in enumerate(lines, 1):
                      for finding_id in ids:
                          if re.search(rf'(?<![A-Za-z0-9-]){re.escape(finding_id)}(?![A-Za-z0-9-])', line):
                              start = max(0, line_no - 2)
                              end = min(len(lines), line_no + 2)
                              contexts[finding_id].append({
                                  'file': str(path.relative_to(project)),
                                  'line': line_no,
                                  'context': '\n'.join(
                                      f'{index + 1}: {lines[index]}' for index in range(start, end)
                                  )[:4000],
                              })

          report = {'unregisteredIds': ids, 'contexts': contexts}
          Path('reports/matrix-id-classification/report.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(f'Collected contexts for {len(ids)} unresolved IDs')
          PY
      - name: Upload ID classification contexts
        uses: actions/upload-artifact@v4
        with:
          name: matrix-id-classification-${{ github.run_id }}
          path: reports/matrix-id-classification/**
          if-no-files-found: error
          retention-days: 7

  patch-token-boundary:
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 28 && github.event.pull_request.head.repo.full_name == github.repository
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Replace substring-permitting ID boundary
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/check_matrix_coverage.py')
          text = path.read_text(encoding='utf-8')
          old = "    rf'\\b((?:{PREFIX_ALT})[A-Z0-9]*(?:-[A-Za-z0-9]+)+)\\b'"
          new = "    rf'(?<![A-Za-z0-9-])((?:{PREFIX_ALT})[A-Z0-9]*(?:-[A-Za-z0-9]+)+)(?![A-Za-z0-9-])'"
          if new in text:
              Path('/tmp/token-boundary.changed').write_text('0')
          else:
              if text.count(old) != 1:
                  raise SystemExit('TOKEN_RE anchor drift')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
              Path('/tmp/token-boundary.changed').write_text('1')
          PY
          python3 -m py_compile scripts/check_matrix_coverage.py
          python3 scripts/check_matrix_coverage.py --warn-only > /tmp/token-boundary-report.log
          if grep -Eq 'UNREGISTERED-EVIDENCE:.*\b(ARIA-01|DEPLOY-RED|UI-EPISTEMIC-BIAS-01|AVRAAM-AUDIT|MAPS-VALIDATE)\b' /tmp/token-boundary-report.log; then
            cat /tmp/token-boundary-report.log
            echo 'suffix/subtoken false positive remains' >&2
            exit 1
          fi
          git diff --check
      - name: Commit checker boundary fix
        shell: bash
        run: |
          if test "$(cat /tmp/token-boundary.changed)" = 0; then
            echo 'Token boundary already fixed.'
            exit 0
          fi
          git add scripts/check_matrix_coverage.py
          test "$(git diff --cached --name-only)" = 'scripts/check_matrix_coverage.py'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(matrix): reject suffix matches inside canonical IDs'
          git push origin HEAD:"${{ github.event.pull_request.head.ref }}"
