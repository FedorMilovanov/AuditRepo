name: Materialize SEO HTML Matrix Closure

on:
  push:
    branches:
      - agent/close-seo-html-scope-04fc99f4
    paths:
      - ".github/workflows/materialize-seo-html-matrix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/close-seo-html-scope-04fc99f4
          fetch-depth: 0

      - name: Apply exact matrix transaction
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          matrix = Path('projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md')
          text = matrix.read_text(encoding='utf-8')

          required = [
              '| Source HEAD | `8a5352671375fdb01b6c30273c25ec4283a13f69`',
              '## ✅ ЗАКРЫТО (135)',
              '## 🟢 P3 — ОТКРЫТО (55)',
              '| VALIDATE-SCOPE-GAP |',
              '| SEO-AUDIT-ROOT-ONLY |',
              '| VALIDATE-JS-ARTICLES-ONLY |',
              '| AUDIT-PRO-ROOT-ONLY |',
              '| Закрыто (fixed) | 130 |',
              '| P3 открыто | 58 |',
              '| **Всего открыто (матрица)** | **200** |',
          ]
          for needle in required:
              count = text.count(needle)
              if count != 1:
                  raise SystemExit(f'expected exactly one occurrence of {needle!r}, found {count}')

          def replace_line(prefix, replacement):
              global text
              lines = text.splitlines()
              matches = [i for i, line in enumerate(lines) if line.startswith(prefix)]
              if len(matches) != 1:
                  raise SystemExit(f'expected one line with prefix {prefix!r}, found {len(matches)}')
              lines[matches[0]] = replacement
              text = '\n'.join(lines) + '\n'

          replace_line(
              '| Source HEAD |',
              '| Source HEAD | `04fc99f4a7925f28577f3b0a6654d3b1aa4af9ba` (current source main; PR #165 registry-derived production SEO + PR #167 registry-derived production HTML breadth) |',
          )
          replace_line(
              '| Deploy |',
              '| Deploy | ✅ **LAST EXACT PRODUCTION @ `8a535267`.** Readiness `30006414898` → Pages `30007024100` success on the same SHA; source `main` is newer and source/CI verified only. |',
          )
          replace_line(
              '| Last reverify |',
              '| Last reverify | `reverify/CURRENT_HEAD_REVERIFY_2026-07-23_04fc99f4_seo-html-contracts.md` |',
          )
          replace_line(
              '⚠️ Старые deploy-формулировки',
              '⚠️ Старые deploy-формулировки ниже исторические. Current source authority: `04fc99f4`; last exact production authority: `8a535267`; source/CI evidence: `reverify/CURRENT_HEAD_REVERIFY_2026-07-23_04fc99f4_seo-html-contracts.md`.',
          )

          text = text.replace('## ✅ ЗАКРЫТО (135)', '## ✅ ЗАКРЫТО (138)', 1)
          text = text.replace('## 🟢 P3 — ОТКРЫТО (55)', '## 🟢 P3 — ОТКРЫТО (52)', 1)

          ids = ['SEO-AUDIT-ROOT-ONLY', 'VALIDATE-SCOPE-GAP', 'VALIDATE-JS-ARTICLES-ONLY']
          for row_id in ids:
              pattern = re.compile(rf'^\| {re.escape(row_id)} \|.*\n', re.MULTILINE)
              text, count = pattern.subn('', text, count=1)
              if count != 1:
                  raise SystemExit(f'failed to remove open row {row_id}')

          replace_line(
              '| AUDIT-PRO-ROOT-ONLY |',
              '| AUDIT-PRO-ROOT-ONLY | 🔄 **NARROWED, STILL OPEN @ `04fc99f4`.** Sitemap breadth is registry-driven (#163), production SEO breadth is registry/dist-driven (#165), and static HTML/link/alt/JSON-LD/H1 breadth covers all 75 production routes (#167). Remaining scope is limited to `audit-pro.js`-specific root-corpus inference and duplicated publication/cache-bust/general checks that have not yet been migrated or retired. |',
          )

          closed = text.index('## ✅ ЗАКРЫТО (138)')
          insert_at = text.index('|---|---|---|\n', closed) + len('|---|---|---|\n')
          rows = (
              '| SEO-AUDIT-ROOT-ONLY | ✅ **FIXED/SOURCE+CI VERIFIED 2026-07-23.** PR #165 derives production SEO from the effective route registry and built `dist`: all 75 routes, exact canonical/robots policy, 66 indexable + 9 explicit noindex, and blocking missing-HTML/Astro-only mutations. Its first witness also fixed 22 heart-series `twitter:image` gaps and `/rodosloviye/` creator metadata. | `3baf6a3f` PR#165 |\n'
              '| VALIDATE-SCOPE-GAP | ✅ **FIXED/SOURCE+CI VERIFIED 2026-07-23.** PR #167 added a dependency-free registry-derived HTML contract after production-like build. All 75 production surfaces receive blocking title/canonical/H1, ID, alt, media/srcset, internal-link, inline-JS and JSON-LD checks; final report: 75 routes, 0 errors. | `04fc99f4` PR#167 |\n'
              '| VALIDATE-JS-ARTICLES-ONLY | ✅ **FIXED AS SAME ROOT 2026-07-23.** `scripts/validate.js` remains backward-compatible, but `articles/*` plus four hardcoded `EXTRA_PAGES` are no longer the only breadth witness: Native Source Contract runs the canonical 75-route audit and permanent mutation suite. | `04fc99f4` PR#167 |\n'
          )
          text = text[:insert_at] + rows + text[insert_at:]

          text = text.replace(
              '## Статистика (обновлено 2026-07-23: production 83f04647 + current-truth cleanup)',
              '## Статистика (обновлено 2026-07-23: source 04fc99f4 + SEO/HTML breadth contracts)',
              1,
          )
          text = text.replace('| Закрыто (fixed) | 130 |', '| Закрыто (fixed) | 138 |', 1)
          text = text.replace('| P3 открыто | 58 |', '| P3 открыто | 55 |', 1)
          text = text.replace('| **Всего открыто (матрица)** | **200** |', '| **Всего открыто (матрица)** | **197** |', 1)

          session_marker = '- **2026-07-23 — Production `83f04647`'
          pos = text.index(session_marker)
          session = (
              '- **2026-07-23 — Source `04fc99f4`: registry-derived SEO and HTML breadth.** '
              'PR #165 moved production SEO to the effective registry and built `dist`; PR #167 added the 75-route static HTML/link/alt/JSON-LD/H1 contract and removed one public link to an unpublished Baptist research file. '
              'Exact source CI is green; production authority remains `8a535267` until a same-SHA readiness/Pages/live witness exists. '
              'Closed `SEO-AUDIT-ROOT-ONLY`, `VALIDATE-SCOPE-GAP` and `VALIDATE-JS-ARTICLES-ONLY`; broader `AUDIT-PRO-ROOT-ONLY` remains narrowly open. '
              'Evidence: `reverify/CURRENT_HEAD_REVERIFY_2026-07-23_04fc99f4_seo-html-contracts.md`.\n\n'
          )
          text = text[:pos] + session + text[pos:]

          p3 = text.index('## 🟢 P3 — ОТКРЫТО (52)')
          for row_id in ids:
              if text.count(f'| {row_id} |') != 1:
                  raise SystemExit(f'expected one final closed row for {row_id}')
              if f'| {row_id} |' in text[p3:]:
                  raise SystemExit(f'{row_id} still appears in open P3 section')

          matrix.write_text(text, encoding='utf-8')
          PY

          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          git commit -m "chore(audit): close SEO and HTML breadth gaps"
          git push origin HEAD:agent/close-seo-html-scope-04fc99f4
