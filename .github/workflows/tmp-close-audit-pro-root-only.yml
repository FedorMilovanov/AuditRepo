name: Temporary close audit-pro root-only

on:
  push:
    branches:
      - agent/close-audit-pro-root-only-73c49e99
    paths:
      - .github/workflows/tmp-close-audit-pro-root-only.yml

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: agent/close-audit-pro-root-only-73c49e99
          fetch-depth: 0

      - name: Reconcile source truth and matrix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          SOURCE = "73c49e992358c850832ac1bbd37c426e7b9e75bb"
          SOURCE8 = SOURCE[:8]
          EVIDENCE = "reverify/CURRENT_HEAD_REVERIFY_2026-07-24_73c49e99_audit-pro-source-corpus.md"
          root = Path("projects/gb-is-my-strength")

          def sub_once(text, pattern, replacement, label, flags=0):
              out, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"{label}: expected 1 replacement, got {count}")
              return out

          prompt_path = root / "NEXT_AGENT_PROMPT.md"
          prompt = prompt_path.read_text(encoding="utf-8")
          prompt = sub_once(prompt, r"\*\*Source main:\*\* `[^`]+`", f"**Source main:** `{SOURCE}`", "prompt source")
          prompt = sub_once(prompt, r"\*\*Current source reverify:\*\* `[^`]+`", f"**Current source reverify:** `{EVIDENCE}`", "prompt evidence")
          prompt = sub_once(prompt, r"- source `main` is `[^`]+`;", f"- source `main` is `{SOURCE8}`;", "prompt boundary source")
          prompt = sub_once(
              prompt,
              r"- PR #165, PR #167 and PR #166 are source/CI verified, but this AuditRepo update does not claim a new exact Pages deployment\.",
              "- homepage rebuild `4ee73bb2` and audit corpus PR #169 (`73c49e99`) are source/CI verified, but this AuditRepo update does not claim a new exact Pages deployment.",
              "prompt boundary details",
          )
          prompt = sub_once(prompt, r"Canonical evidence: `reverify/[^`]+`\.", f"Canonical evidence: `{EVIDENCE}`.", "prompt canonical evidence")
          completed_anchor = "- Search & Index issue #57 — implemented by PR #166 through one explicit 75-route policy matrix for robots, Pagefind, search-manifest, sitemap and RSS.\n"
          if completed_anchor not in prompt:
              raise SystemExit("prompt completed anchor missing")
          prompt = prompt.replace(
              completed_anchor,
              completed_anchor + "- `AUDIT-PRO-ROOT-ONLY` — closed by PR #169: the source HTML corpus is registry-owned, 52 committed production shadows and 23 dist-only routes are explicit, unregistered root HTML is blocking, duplicated HTML scans use one corpus, and adversarial mutations are permanent CI.\n",
              1,
          )
          prompt = prompt.replace(
              "- source PR #156 — Gill editorial/research corrections;\n- Research PR #7 and AuditRepo PR #27 — Gill source corpus and evidence.",
              "- source PR #156 — Gill editorial/research corrections;\n- source PR #136 and #130 — isolated documentation link repairs;\n- Research PR #7 and AuditRepo PR #27 — Gill source corpus and evidence.",
              1,
          )
          prompt = sub_once(
              prompt,
              r"## 4\) Active work, in order\n.*?\n## 5\) Open findings that remain real",
              """## 4) Active work, in order

1. **Handle the PR #167 warning inventory only after active-PR collision checks**
   - 19 title/OG-title drifts;
   - 10 Baptist reading pages without `article:modified_time`;
   - 5 Nagornaya reading pages without the generic byline marker.
   These are visible editorial debts, not suppressed baseline exceptions.

2. **Reader R6 / issue #59**
   - unify progress, resume, bookmarks and notes only after shared-runtime overlap with PR #161 is resolved;
   - books remain `surface=series` + `seriesShape=book`, not a second engine.

3. Continue verified P0/P1 order from `MASTER_BUG_MATRIX.md`, refreshing active PR intersections before every lane.

## 5) Open findings that remain real""",
              "prompt active section",
              flags=re.S,
          )
          prompt = prompt.replace("- `AUDIT-PRO-ROOT-ONLY` — only the remaining audit-pro-specific root-corpus/publication/cache-bust tail.\n", "", 1)
          prompt_path.write_text(prompt, encoding="utf-8")

          matrix_path = root / "verified/MASTER_BUG_MATRIX.md"
          matrix = matrix_path.read_text(encoding="utf-8")
          matrix = sub_once(
              matrix,
              r"\| Source HEAD \| `[^`]+` \([^\n]+\) \|",
              f"| Source HEAD | `{SOURCE}` (current source main; homepage rebuild `4ee73bb2` plus PR #169 registry-owned audit-pro corpus) |",
              "matrix source",
          )
          matrix = sub_once(matrix, r"\| Last reverify \| `[^`]+` \|", f"| Last reverify | `{EVIDENCE}` |", "matrix evidence")
          matrix = sub_once(
              matrix,
              r"⚠️ Старые deploy-формулировки ниже исторические\. Current source authority: `[^`]+`; last exact production authority: `8a535267`; source/CI evidence: `[^`]+`\.",
              f"⚠️ Старые deploy-формулировки ниже исторические. Current source authority: `{SOURCE8}`; last exact production authority: `8a535267`; source/CI evidence: `{EVIDENCE}`.",
              "matrix authority",
          )
          matrix = matrix.replace("## ✅ ЗАКРЫТО (138)", "## ✅ ЗАКРЫТО (139)", 1)
          closed_anchor = "|---|---|---|\n"
          closed_row = (
              "| AUDIT-PRO-ROOT-ONLY | ✅ **FIXED/SOURCE+CI VERIFIED 2026-07-24.** PR #169 makes the early source HTML corpus registry-owned without duplicating the production-dist audit: all 75 production routes are explicit as 52 committed source shadows + 23 dist-only routes delegated to mandatory production SEO/HTML/Search contracts; unregistered root HTML and duplicate route mappings are blocking; repeated publication guards consume one corpus; the previously vacuous Russian quote-policy path test is repaired; adversarial mutations are permanent CI. Exact final head `7bda4b44`: Shared Files Guard `30045742164` and Route Registry Validators `30045742230` succeeded; Chromium recorded 75/75 routes, 3428/3428 contracts, route semantics 126/126 and Nagornaya UI 174/174. | `73c49e99` PR#169 |\n"
          )
          if closed_anchor not in matrix:
              raise SystemExit("matrix closed anchor missing")
          matrix = matrix.replace(closed_anchor, closed_anchor + closed_row, 1)
          matrix = matrix.replace(
              "Broader `AUDIT-PRO-ROOT-ONLY` and `SEO-AUDIT-ROOT-ONLY` remain open.",
              "Sibling breadth rows are closed by PR #165 and PR #169.",
              1,
          )
          matrix = matrix.replace("## 🟢 P3 — ОТКРЫТО (52)", "## 🟢 P3 — ОТКРЫТО (51)", 1)
          matrix, removed = re.subn(r"^\| AUDIT-PRO-ROOT-ONLY \|.*\n", "", matrix, count=1, flags=re.M)
          if removed != 1:
              raise SystemExit(f"matrix open row: expected 1 removal, got {removed}")
          matrix = matrix.replace(
              "## Статистика (обновлено 2026-07-23: source 7187c32a + Search/SEO/HTML contracts)",
              "## Статистика (обновлено 2026-07-24: source 73c49e99 + registry-owned audit-pro corpus)",
              1,
          )
          matrix = matrix.replace("| Закрыто (fixed) | 138 |", "| Закрыто (fixed) | 139 |", 1)
          matrix = matrix.replace("| P3 открыто | 55 |", "| P3 открыто | 54 |", 1)
          matrix = matrix.replace("| **Всего открыто (матрица)** | **197** |", "| **Всего открыто (матрица)** | **196** |", 1)
          session_anchor = "- **2026-07-23 — Source `7187c32a`: Search, SEO and HTML breadth.**"
          if session_anchor not in matrix:
              raise SystemExit("matrix session anchor missing")
          new_session = (
              "- **2026-07-24 — Source `73c49e99`: registry-owned audit-pro source corpus.** PR #169 closed the final `AUDIT-PRO-ROOT-ONLY` inference tail while preserving the parallel homepage rebuild: 75 production routes are explicit as 52 committed shadows + 23 dist-only routes, stray root HTML is blocking, repeated HTML guards share one corpus, and quote-policy routing is live. Exact final head `7bda4b44` passed Shared Files Guard `30045742164` and Route Registry Validators `30045742230`; browser artifact `8579172903` records 75/75 routes and zero contract failures. Production authority remains `8a535267` pending a same-SHA deploy witness. Evidence: `" + EVIDENCE + "`.\n\n"
          )
          matrix = matrix.replace(session_anchor, new_session + session_anchor, 1)
          matrix_path.write_text(matrix, encoding="utf-8")

          evidence_path = root / EVIDENCE
          evidence_path.write_text(f"""# CURRENT HEAD REVERIFY — `73c49e99` — registry-owned audit-pro source corpus

Date: 2026-07-24

## Boundary

- Current source `main`: `{SOURCE}`.
- Last exact deployed source remains `8a5352671375fdb01b6c30273c25ec4283a13f69`.
- This record closes a source/CI defect. It does **not** claim that `{SOURCE8}` is already the exact GitHub Pages deployment.
- Parallel homepage rebuild `4ee73bb2fd9568c107f5c62ab2d96da38e21aa6f` was already in `main` and its new G113 homepage contract was preserved during reconciliation.

## Closed canonical row

`AUDIT-PRO-ROOT-ONLY` is closed by source PR #169, merge `{SOURCE}`.

The fix does not turn `audit-pro.js` into a second `dist` audit. It gives the early source gate an explicit registry-owned corpus:

- 75 production routes total;
- 52 committed production-shadow HTML files audited at source time;
- 23 dist-only routes explicitly delegated to mandatory built-output SEO, HTML and Search/Index contracts;
- unregistered root HTML is blocking;
- duplicate route-to-root mappings are blocking;
- repeated HTML anti-regression scans consume one `htmlPages` corpus;
- the Russian quote-policy loop now evaluates repository-relative article/Nagornaya paths instead of vacuously testing absolute paths;
- corpus mutations cover dist-only classification, orphan rejection and disappearing source shadows without a second route list.

## Parallel-agent reconciliation

The homepage agent advanced source `main` from `7187c32a` to `4ee73bb2` and changed `scripts/audit-pro.js` in the G113 homepage contract. Exact base, PR and new-main versions were reconciled through a three-way merge with no conflict markers. The final source PR contained only:

1. `.github/workflows/route-registry-validators.yml`;
2. `scripts/audit-pro-source-corpus-test.js`;
3. `scripts/audit-pro.js`;
4. `scripts/lib/audit-pro-source-corpus.js`.

No temporary workflow, materializer, route allowlist or homepage implementation file remained in the final diff.

## Exact source verification

Final PR head: `7bda4b449044597536782a02635482d078f6299d`.

- Shared Files Guard `30045742164` — success, including workflow policy, shared-system guards and actionlint.
- Route Registry Validators `30045742230` — success.
- Registry/adversarial contracts — success.
- Production-like build — success.
- Registry-derived production SEO — success.
- Search & Index policy — success.
- Chromium public-surface matrix — 75/75 routes; 3428/3428 contracts; 0 failures.
- Route semantics — 126/126; 0 failures.
- Nagornaya epistemic UI — 174/174; 0 failures.
- Browser evidence artifact `8579172903`, SHA-256 digest `188d687c9bbac61362fd3548c27ab508c059ff6185903bc3c9341c48955045e8`, is attached to the exact final head.

## Matrix effect

- closed: 138 → 139;
- P3 section: 52 → 51;
- statistical P3: 55 → 54;
- total open rows: 197 → 196;
- no canonical row was aliased or silently deleted;
- source authority advances to `{SOURCE8}` while production authority remains `8a535267`.

## Remaining execution order

The audit/route-scope architecture lane is complete. Next work must be selected from still-open current evidence and coordinated against active source PRs #156, #161, #136 and #130 plus AuditRepo PR #27. Immediate documented candidates are the 34 PR #167 editorial warnings, Reader R6/issue #59, and the verified P0/P1 matrix order.
""", encoding="utf-8")

          for path in (prompt_path, matrix_path, evidence_path):
              if not path.read_text(encoding="utf-8").strip():
                  raise SystemExit(f"empty output: {path}")
          PY

      - name: Validate AuditRepo before committing
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/check_auditrepo_structure.py
          python3 scripts/validate_audit_repo.py
          python3 scripts/check_matrix_coverage.py --warn-only --verbose --json-out /tmp/matrix-coverage.json

      - name: Commit permanent reconciliation and remove materializer
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/tmp-close-audit-pro-root-only.yml
          git config user.name "audit-reconciler[bot]"
          git config user.email "audit-reconciler[bot]@users.noreply.github.com"
          git add projects/gb-is-my-strength/NEXT_AGENT_PROMPT.md \
                  projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md \
                  projects/gb-is-my-strength/reverify/CURRENT_HEAD_REVERIFY_2026-07-24_73c49e99_audit-pro-source-corpus.md \
                  .github/workflows/tmp-close-audit-pro-root-only.yml
          git diff --cached --check
          git commit -m "chore(audit): close registry-owned audit-pro corpus gap"
          git push origin HEAD:agent/close-audit-pro-root-only-73c49e99
