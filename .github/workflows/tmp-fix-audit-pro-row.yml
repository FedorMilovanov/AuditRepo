name: Temporary fix audit-pro matrix row

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/tmp-fix-audit-pro-row.yml
      - projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md

permissions:
  contents: write

jobs:
  fix-row:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: agent/close-audit-pro-root-only-73c49e99
          fetch-depth: 0

      - name: Move canonical row from open to closed
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md')
          text = path.read_text(encoding='utf-8')
          closed_row = "| AUDIT-PRO-ROOT-ONLY | ✅ **FIXED/SOURCE+CI VERIFIED 2026-07-24.** PR #169 makes the early source HTML corpus registry-owned without duplicating the production-dist audit: all 75 production routes are explicit as 52 committed source shadows + 23 dist-only routes delegated to mandatory production SEO/HTML/Search contracts; unregistered root HTML and duplicate route mappings are blocking; repeated publication guards consume one corpus; the previously vacuous Russian quote-policy path test is repaired; adversarial mutations are permanent CI. Exact final head `7bda4b44`: Shared Files Guard `30045742164` and Route Registry Validators `30045742230` succeeded; Chromium recorded 75/75 routes, 3428/3428 contracts, route semantics 126/126 and Nagornaya UI 174/174. | `73c49e99` PR#169 |\n"

          if closed_row in text:
              raise SystemExit('closed row already exists unexpectedly')

          open_pattern = r"^\| AUDIT-PRO-ROOT-ONLY \| 🔄 \*\*NARROWED, STILL OPEN.*\n"
          text, count = re.subn(open_pattern, '', text, count=1, flags=re.M)
          if count != 1:
              raise SystemExit(f'expected exactly one open row, removed {count}')

          anchor = "## ✅ ЗАКРЫТО (139)\n\n| ID | Описание | Коммит |\n|---|---|---|\n"
          if text.count(anchor) != 1:
              raise SystemExit(f'closed table anchor count={text.count(anchor)}')
          text = text.replace(anchor, anchor + closed_row, 1)

          if text.count('| AUDIT-PRO-ROOT-ONLY |') != 1:
              raise SystemExit('canonical row count is not exactly one after move')
          if 'NARROWED, STILL OPEN' in text:
              raise SystemExit('stale open wording remains')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate corrected AuditRepo
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/check_auditrepo_structure.py
          python3 scripts/validate_audit_repo.py
          python3 scripts/check_matrix_coverage.py --warn-only --verbose --json-out /tmp/matrix-coverage.json

      - name: Commit correction and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/tmp-fix-audit-pro-row.yml
          git config user.name "audit-reconciler[bot]"
          git config user.email "audit-reconciler[bot]@users.noreply.github.com"
          git add projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md .github/workflows/tmp-fix-audit-pro-row.yml
          git diff --cached --check
          git commit -m "fix(audit): move audit-pro row into closed matrix"
          git push origin HEAD:agent/close-audit-pro-root-only-73c49e99
