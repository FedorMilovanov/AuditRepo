name: Temporary fix map keyboard row status

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/tmp-fix-map-keyboard-row-status.py
      - .github/workflows/tmp-fix-map-keyboard-row-status.yml

permissions:
  contents: write

jobs:
  fix-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact reconciliation branch
        uses: actions/checkout@v4
        with:
          ref: agent/close-map-keyboard-p1-bd537dc1
          fetch-depth: 0

      - name: Move explicit open rows into closed table
        run: python3 scripts/tmp-fix-map-keyboard-row-status.py

      - name: Validate corrected AuditRepo
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/check_auditrepo_structure.py
          python3 scripts/validate_audit_repo.py
          python3 scripts/check_matrix_coverage.py --warn-only --verbose --json-out /tmp/matrix-coverage.json

      - name: Commit matrix correction only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "audit-reconciler[bot]"
          git config user.email "audit-reconciler[bot]@users.noreply.github.com"
          git add projects/gb-is-my-strength/verified/MASTER_BUG_MATRIX.md
          git diff --cached --check
          git commit -m "fix(audit): move map keyboard rows into closed table"
          git push origin HEAD:agent/close-map-keyboard-p1-bd537dc1
